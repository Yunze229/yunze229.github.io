name: Unlock Due Capsule Letters

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 01:00 PDT / 02:00 PST
  workflow_dispatch:

jobs:
  unlock:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Transfer due letters and notify
        env:
          LETTERS_PAT:          ${{ secrets.LETTERS_PAT }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY_2 }}
          REVEAL_ACTION_SECRET: ${{ secrets.REVEAL_ACTION_SECRET }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request, urllib.parse, base64, hmac, hashlib
          from datetime import date

          LETTERS_PAT   = os.environ['LETTERS_PAT']
          RESEND_KEY    = os.environ['RESEND_API_KEY']
          REVEAL_SECRET = os.environ.get('REVEAL_ACTION_SECRET', '')
          PRIVATE_REPO  = 'hxz49/yunze-letters'
          TODAY         = date.today().isoformat()
          CAPSULE_DIR   = 'content/capsule'
          MOM_EMAIL     = 'hxz49@hotmail.com'
          YUNZE_EMAIL   = 'dyz229@outlook.com'
          FROM_EMAIL    = 'Yunze 的时光胶囊 <capsule@duyunze.com>'
          REPLY_TO      = 'hxz49@hotmail.com'
          REVEAL_URL    = 'https://capsule.duyunze.com/reveal-action'

          def gh_api(url, method='GET', payload=None):
            headers = {
              'Authorization': 'Bearer ' + LETTERS_PAT,
              'User-Agent': 'yunze-capsule-unlock',
              'Accept': 'application/vnd.github.v3+json',
            }
            data = json.dumps(payload).encode() if payload else None
            req = urllib.request.Request(url, data=data, method=method, headers=headers)
            if data:
              req.add_header('Content-Type', 'application/json')
            try:
              with urllib.request.urlopen(req) as r:
                return json.loads(r.read()), r.status
            except urllib.error.HTTPError as e:
              return {}, e.code

          def fm_get(fm_text, key):
            m = re.search(r'^' + re.escape(key) + r':\s*["\']?(.*?)["\']?\s*$', fm_text, re.MULTILINE)
            return m.group(1).strip() if m else ''

          def extract_body_en(fm_text):
            m = re.search(r'^body_en:\s*\|[-]?\n((?:[ \t]{2}[^\n]*\n?)*)', fm_text, re.MULTILINE)
            if not m:
              return ''
            lines = m.group(1).splitlines()
            return '\n'.join(l[2:] if l.startswith('  ') else l for l in lines).strip()

          def esc(text):
            return text.replace('&', '&amp;').replace('<', '&lt;').replace('\n', '<br>')

          def reveal_action_token(slug, action):
            sig = hmac.new(
              REVEAL_SECRET.encode('utf-8'),
              (slug + '|' + action).encode('utf-8'),
              hashlib.sha256
            ).digest()
            return base64.urlsafe_b64encode(sig).decode('ascii').rstrip('=')

          def yunze_buttons_block(slug):
            if not REVEAL_SECRET:
              return ''
            reveal_tok = reveal_action_token(slug, 'reveal')
            keep_tok   = reveal_action_token(slug, 'keep')
            slug_q     = urllib.parse.quote(slug, safe='')
            reveal_url = REVEAL_URL + '?slug=' + slug_q + '&action=reveal&token=' + reveal_tok
            keep_url   = REVEAL_URL + '?slug=' + slug_q + '&action=keep&token='   + keep_tok
            return (
              '<p style="margin:28px 0 8px;font-size:14px">想现在公开到博客吗?<br>'
              '<span style="color:#888;font-size:13px">Want to share this letter on the blog now?</span></p>'
              '<table style="border-collapse:separate;border-spacing:8px 0;margin:0 0 12px"><tr>'
              '<td><a href="' + reveal_url + '" '
              'style="background:#2a2a2a;color:#fff;padding:10px 18px;text-decoration:none;'
              'border-radius:4px;display:inline-block;font-size:14px">&#x2705; 公开到博客</a></td>'
              '<td><a href="' + keep_url + '" '
              'style="background:#999;color:#fff;padding:10px 18px;text-decoration:none;'
              'border-radius:4px;display:inline-block;font-size:14px">&#129296; 先不公开</a></td>'
              '</tr></table>'
              '<p style="font-size:12px;color:#888;line-height:1.7">'
              '无论选哪个，都可以以后在 <a href="https://duyunze.com/admin">CMS</a> 改主意。<br>'
              'Either choice can be changed later in CMS.'
              '</p>'
            )

          def render_unlock_html(from_zh, from_en, title_zh, title_en,
                                 date_written, unlock_date, body_zh, body_en,
                                 footer_html):
            td = 'style="padding:4px 12px 4px 0;color:#888;white-space:nowrap"'
            table_rows = (
              '<tr><td ' + td + '>来自 From</td><td>' + from_zh + ' / ' + from_en + '</td></tr>'
              '<tr><td ' + td + '>标题 Title</td><td>' + title_zh + ' / ' + title_en + '</td></tr>'
              '<tr><td ' + td + '>写于 Written</td><td>' + date_written + '</td></tr>'
              '<tr><td ' + td + '>开封日 Opened</td><td>' + unlock_date + '</td></tr>'
            )
            zh_block = (
              '<h3 style="margin-top:24px">&#128221; 信件内容</h3>'
              '<p style="line-height:1.9">' + esc(body_zh) + '</p>'
            ) if body_zh else ''
            en_block = (
              '<h3 style="margin-top:24px">&#128221; Letter</h3>'
              '<p style="line-height:1.9">' + esc(body_en) + '</p>'
            ) if body_en else ''
            return (
              '<div style="font-family:sans-serif;font-size:15px;max-width:640px">'
              '<h2>&#128140; 时光胶囊开封了</h2>'
              '<table style="border-collapse:collapse;font-size:14px">' + table_rows + '</table>'
              '<hr style="margin:20px 0;border:none;border-top:1px solid #eee">'
              + zh_block + en_block +
              '<hr style="margin:24px 0;border:none;border-top:1px solid #eee">'
              + footer_html +
              '</div>'
            )

          def send_one(to_addr, subject, html):
            payload = {
              'from':     FROM_EMAIL,
              'to':       [to_addr],
              'reply_to': REPLY_TO,
              'subject':  subject,
              'html':     html,
            }
            req = urllib.request.Request(
              'https://api.resend.com/emails',
              data=json.dumps(payload).encode(),
              method='POST',
              headers={
                'Authorization': 'Bearer ' + RESEND_KEY,
                'Content-Type': 'application/json',
              }
            )
            try:
              with urllib.request.urlopen(req) as r:
                print('  Email sent to ' + to_addr)
            except urllib.error.HTTPError as e:
              print('  Email failed (' + to_addr + '): ' + str(e.code) + ' ' + e.read().decode()[:200])

          MOM_FOOTER = (
            '<p style="color:#888;font-size:12px;line-height:1.7">'
            '信件已自动推进博客（未公开）。决定权在 Yunze 这边（他会收到一封含按钮的邮件）。<br>'
            'Letter pushed to blog (hidden). Publish decision is Yunze’s.'
            '</p>'
          )

          def send_unlock_emails(slug, from_zh, from_en, title_zh, title_en,
                                 date_written, unlock_date, body_zh, body_en):
            mom_html = render_unlock_html(
              from_zh, from_en, title_zh, title_en,
              date_written, unlock_date, body_zh, body_en, MOM_FOOTER
            )
            yunze_html = render_unlock_html(
              from_zh, from_en, title_zh, title_en,
              date_written, unlock_date, body_zh, body_en, yunze_buttons_block(slug)
            )
            send_one(
              MOM_EMAIL,
              '\U0001f48c 信开封了:' + from_zh + ' 写给 Yunze (' + title_zh + ')',
              mom_html
            )
            send_one(
              YUNZE_EMAIL,
              '\U0001f48c 你的信开了:' + from_zh + ' 写给你 — ' + title_zh,
              yunze_html
            )

          data, status = gh_api(
            'https://api.github.com/repos/' + PRIVATE_REPO + '/contents/letters'
          )
          if status == 404:
            print('No letters/ directory in private repo')
            exit(0)
          if status != 200:
            print('ERROR: Cannot access private repo (HTTP ' + str(status) + ')')
            exit(1)

          count = 0
          for file_info in data:
            if not file_info['name'].endswith('.md'):
              continue

            fdata, fstatus = gh_api(file_info['url'])
            if fstatus != 200:
              print('[SKIP] ' + file_info['name'] + ': fetch failed (' + str(fstatus) + ')')
              continue

            raw = base64.b64decode(fdata['content'].replace('\n', '')).decode('utf-8')
            sha = fdata['sha']

            parsed = re.match(r'^---\n(.*?)\n---\n?(.*)', raw, re.DOTALL)
            if not parsed:
              continue
            fm_text = parsed.group(1).strip()
            body_zh = parsed.group(2).strip()

            unlock_date  = fm_get(fm_text, 'unlock_date').strip("'\"")
            transferred  = fm_get(fm_text, 'transferred') == 'true'

            if not unlock_date or transferred or unlock_date > TODAY:
              continue

            title_zh     = fm_get(fm_text, 'title')
            title_en     = fm_get(fm_text, 'title_en')
            from_zh      = fm_get(fm_text, 'from')
            from_en      = fm_get(fm_text, 'from_en')
            date_written = fm_get(fm_text, 'date')
            body_en      = extract_body_en(fm_text)

            print('[UNLOCK] ' + file_info['name'] + '  (' + from_zh + ' -> ' + unlock_date + ')')

            pub_path = CAPSULE_DIR + '/' + file_info['name']
            if os.path.exists(pub_path):
              print('  File already in public repo, skipping write')
            else:
              def q(s):
                return s.replace('"', '\\"')
              fm_lines = [
                '---',
                'title: "' + q(title_zh) + '"',
                'title_en: "' + q(title_en) + '"',
                'date: ' + date_written,
                'unlock_date: ' + unlock_date,
                'from: "' + q(from_zh) + '"',
                'from_en: "' + q(from_en) + '"',
              ]
              if body_en:
                indented = '\n'.join('  ' + l for l in body_en.splitlines())
                fm_lines.append('body_en: |-\n' + indented)
              fm_lines += ['read_by_admin: false', 'revealed: false', '---']
              pub_content = '\n'.join(fm_lines)
              if body_zh:
                pub_content += '\n\n' + body_zh
              pub_content += '\n'
              os.makedirs(CAPSULE_DIR, exist_ok=True)
              with open(pub_path, 'w', encoding='utf-8') as f:
                f.write(pub_content)
              print('  Wrote ' + pub_path)

            slug = file_info['name'][:-3]  # strip .md
            send_unlock_emails(
              slug, from_zh, from_en, title_zh, title_en,
              date_written, unlock_date, body_zh, body_en
            )

            if 'transferred:' in fm_text:
              updated_fm = re.sub(
                r'^transferred:\s*(false|true)', 'transferred: true',
                fm_text, flags=re.MULTILINE
              )
            else:
              updated_fm = fm_text + '\ntransferred: true'
            updated_raw = '---\n' + updated_fm + '\n---\n\n' + body_zh + '\n'
            updated_b64 = base64.b64encode(updated_raw.encode()).decode()
            _, put_status = gh_api(
              'https://api.github.com/repos/' + PRIVATE_REPO + '/contents/letters/' + file_info['name'],
              method='PUT',
              payload={
                'message': 'unlock: ' + from_zh + ' -> ' + unlock_date,
                'content': updated_b64,
                'sha': sha,
              }
            )
            if put_status in (200, 201):
              print('  Marked transferred in private repo')
            else:
              print('  WARNING: failed to mark transferred (HTTP ' + str(put_status) + ')')

            count += 1

          print('Done: ' + str(count) + ' letter(s) unlocked on ' + TODAY)
          PYEOF

      - name: Commit new capsule stubs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/capsule/
          if git diff --staged --quiet; then
            echo "Nothing new to commit"
          else
            git commit -m "capsule: auto-unlock letters for $(date +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
