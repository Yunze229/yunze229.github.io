name: AI Draft Review

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**.md'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed draft posts
        id: drafts
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/*.md' 2>/dev/null || echo "")
          drafts=""
          for f in $changed; do
            if [ -f "$f" ] && grep -q "^draft: true" "$f"; then
              drafts="$drafts $f"
            fi
          done
          echo "files=$drafts" >> $GITHUB_OUTPUT

      - name: AI review drafts
        if: steps.drafts.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRAFT_FILES: ${{ steps.drafts.outputs.files }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          draft_files = os.environ.get('DRAFT_FILES', '').strip().split()

          for filepath in draft_files:
            if not filepath or not os.path.exists(filepath):
              continue

            with open(filepath, 'r', encoding='utf-8') as f:
              content = f.read()

            # Extract title
            title = filepath
            for line in content.splitlines():
              if line.startswith('title:'):
                title = line.replace('title:', '').strip().strip('"')
                break

            # Call Claude API
            payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 1024,
              "messages": [{
                "role": "user",
                "content": f"""你是一个友善的写作助手，帮助一个10岁的孩子改善他的博客文章。
请用简单易懂的语言给出3-5条具体的改进建议，包括：
- 内容是否清晰完整
- 表达是否准确生动
- 有没有可以展开的地方
- 结构是否清晰

用中文回复，语气要鼓励，像朋友一样说话。

文章内容：

{content}"""
              }]
            }

            req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps(payload).encode(),
              headers={
                'x-api-key': os.environ['ANTHROPIC_API_KEY'],
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
              }
            )

            try:
              with urllib.request.urlopen(req) as resp:
                data = json.loads(resp.read())
                suggestion = data['content'][0]['text']
            except Exception as e:
              suggestion = f"API 调用失败：{e}"

            # Create GitHub Issue
            body = f"""## 文件
`{filepath}`

## Claude 的建议

{suggestion}

---
*这是自动生成的写作建议，仅供参考。修改完成后可关闭此 Issue。*"""

            issue_payload = json.dumps({"title": f"📝 AI 草稿建议：{title}", "body": body}).encode()
            repo = os.environ['REPO']
            token = os.environ['GH_TOKEN']
            req2 = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/issues',
              data=issue_payload,
              headers={
                'Authorization': f'token {token}',
                'Content-Type': 'application/json',
                'Accept': 'application/vnd.github+json',
              }
            )
            with urllib.request.urlopen(req2) as resp:
              result = json.loads(resp.read())
              print(f"Issue created: {result['html_url']}")

          PYEOF
