name: AI Draft Review

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**.md'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed draft posts
        id: drafts
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/*.md' 2>/dev/null || echo "")
          drafts=""
          for f in $changed; do
            if [ -f "$f" ] && grep -q "^draft: true" "$f"; then
              drafts="$drafts $f"
            fi
          done
          echo "files=$drafts" >> $GITHUB_OUTPUT

      - name: AI review drafts
        if: steps.drafts.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DRAFT_FILES: ${{ steps.drafts.outputs.files }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request

          draft_files = os.environ.get('DRAFT_FILES', '').strip().split()

          for filepath in draft_files:
            if not filepath or not os.path.exists(filepath):
              continue

            with open(filepath, 'r', encoding='utf-8') as f:
              content = f.read()

            title = filepath
            for line in content.splitlines():
              if line.startswith('title:'):
                title = line.replace('title:', '').strip().strip('"')
                break

            # Call Claude API
            prompt = (
              "你是一个友善的写作助手，帮助一个10岁的孩子改善他的博客文章。\n"
              "请用简单易懂的语言给出3-5条具体的改进建议，包括：\n"
              "- 内容是否清晰完整\n"
              "- 表达是否准确生动\n"
              "- 有没有可以展开的地方\n"
              "- 结构是否清晰\n\n"
              "用中文回复，语气要鼓励，像朋友一样说话。\n\n"
              "文章内容：\n\n" + content
            )
            payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 1024,
              "messages": [{"role": "user", "content": prompt}]
            }

            req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps(payload).encode(),
              headers={
                'x-api-key': os.environ['ANTHROPIC_API_KEY'],
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
              }
            )

            try:
              with urllib.request.urlopen(req) as resp:
                data = json.loads(resp.read())
                suggestion = data['content'][0]['text']
            except Exception as e:
              suggestion = f"API 调用失败：{e}"

            # Send email via Resend
            suggestion_html = suggestion.replace('\n', '<br>')
            email_payload = json.dumps({
              "from": "Yunze Blog <onboarding@resend.dev>",
              "to": ["dyz229@outlook.com"],
              "subject": f"📝 AI 草稿建议：{title}",
              "html": f"""<h2>文件：{filepath}</h2>
<h3>Claude 的建议</h3>
<p>{suggestion_html}</p>
<hr>
<p><em>这是自动生成的写作建议，仅供参考。</em></p>"""
            }).encode()

            req2 = urllib.request.Request(
              'https://api.resend.com/emails',
              data=email_payload,
              headers={
                'Authorization': f'Bearer {os.environ["RESEND_API_KEY"]}',
                'Content-Type': 'application/json',
              }
            )
            try:
              with urllib.request.urlopen(req2) as resp:
                result = json.loads(resp.read())
                print(f"Email sent: {result.get('id')}")
            except Exception as e:
              print(f"Email failed: {e}")

          PYEOF
