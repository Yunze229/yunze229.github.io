name: AI Draft Review

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**.md'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: pip install resend --quiet

      - name: Find changed draft posts
        id: drafts
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/*.md' 2>/dev/null || echo "")
          drafts=""
          for f in $changed; do
            if [ -f "$f" ] && grep -q "^draft: true" "$f"; then
              drafts="$drafts $f"
            fi
          done
          echo "files=$drafts" >> $GITHUB_OUTPUT

      - name: AI review drafts
        if: steps.drafts.outputs.files != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY_2: ${{ secrets.RESEND_API_KEY_2 }}
          DRAFT_FILES: ${{ steps.drafts.outputs.files }}
        run: python3 .github/scripts/ai-review.py
