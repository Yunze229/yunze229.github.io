name: Translate Capsule Letters

on:
  push:
    branches: [main]
    paths:
      - 'content/capsule/**.md'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Translate capsule letters
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request

          capsule_dir = 'content/capsule'

          # Find changed capsule files — fall back to all files if manually triggered
          import subprocess
          result = subprocess.run(
            ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD', '--', 'content/capsule/'],
            capture_output=True, text=True
          )
          changed = [f.strip() for f in result.stdout.splitlines() if f.strip().endswith('.md')]

          if not changed:
            print('No diff found — scanning all capsule files (workflow_dispatch).')
            changed = [
              os.path.join(capsule_dir, f)
              for f in os.listdir(capsule_dir)
              if f.endswith('.md') and f != '_index.md'
            ]

          def fm_get(fm_text, key):
            m = re.search(rf'^{key}:\s*["\']?(.*?)["\']?\s*$', fm_text, re.MULTILINE)
            return m.group(1).strip() if m else ''

          def insert_after(fm_text, after_key, new_line):
            return re.sub(
              rf'^({re.escape(after_key)}:[ \t]*[^\n]*)',
              r'\1\n' + new_line,
              fm_text, count=1, flags=re.MULTILINE
            )

          for filepath in changed:
            if not os.path.exists(filepath):
              continue

            with open(filepath, 'r', encoding='utf-8') as f:
              raw = f.read()

            m = re.match(r'^---\n(.*?)\n---\n?(.*)', raw, re.DOTALL)
            if not m:
              continue
            fm_text, body = m.group(1), m.group(2).strip()

            title    = fm_get(fm_text, 'title')
            from_p   = fm_get(fm_text, 'from')
            title_en = fm_get(fm_text, 'title_en')
            from_en  = fm_get(fm_text, 'from_en')
            body_en  = fm_get(fm_text, 'body_en')

            is_stub = not body

            needs_title_en = not title_en
            needs_from_en  = not from_en
            needs_body_en  = not body_en and not is_stub  # stubs have no body to translate

            if not (needs_title_en or needs_from_en or needs_body_en):
              print(f'  [SKIP] {filepath}: already translated')
              continue

            # Stubs only need title/from translated — skip if both are already set
            if is_stub and not (needs_title_en or needs_from_en):
              print(f'  [SKIP] {filepath}: stub, title/from already translated')
              continue

            print(f'  [TRANSLATE] {filepath}')

            if is_stub:
              prompt = (
                "请将以下中文信件标题和写信人翻译成英文。\n\n"
                "严格按如下格式返回，不要添加其他内容：\n\n"
                "TITLE: [标题英文]\n"
                "FROM: [写信人英文称谓，妈妈→Mom，爸爸→Dad，爷爷→Grandpa，奶奶→Grandma，Yunze保持不变]\n\n"
                f"标题：{title}\n"
                f"写信人：{from_p}"
              )
            else:
              prompt = (
                "以下是家人写给孩子的一封信（孩子的优势语言是英文）。"
                "请翻译成自然、温暖的英文，保留原文的情感和语气。\n\n"
                "严格按如下格式返回，不要添加其他内容：\n\n"
                "TITLE: [标题英文]\n"
                "FROM: [写信人英文称谓，妈妈→Mom，爸爸→Dad，爷爷→Grandpa，奶奶→Grandma，Yunze保持不变]\n"
                "---BODY---\n"
                "[正文英文翻译，保留Markdown格式]\n"
                "---END---\n\n"
                f"标题：{title}\n"
                f"写信人：{from_p}\n"
                f"正文：\n{body}"
              )

            req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=json.dumps({
                'model': 'claude-sonnet-4-6',
                'max_tokens': 4096,
                'messages': [{'role': 'user', 'content': prompt}]
              }).encode(),
              headers={
                'x-api-key': os.environ['ANTHROPIC_API_KEY'],
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json',
              }
            )

            try:
              with urllib.request.urlopen(req, timeout=180) as resp:
                resp_text = json.loads(resp.read())['content'][0]['text']
            except Exception as e:
              print(f'  [ERROR] API: {e}')
              continue

            t_match = re.search(r'^TITLE:\s*(.+)$', resp_text, re.MULTILINE)
            f_match = re.search(r'^FROM:\s*(.+)$', resp_text, re.MULTILINE)
            b_match = re.search(r'---BODY---\s*(.*?)\s*---END---', resp_text, re.DOTALL)

            if not (t_match and f_match):
              print(f'  [ERROR] Parse failed: {resp_text[:300]}')
              continue

            if needs_body_en and not b_match:
              print(f'  [ERROR] Body parse failed: {resp_text[:300]}')
              continue

            t_val = t_match.group(1).strip().strip('"')
            f_val = f_match.group(1).strip().strip('"')

            # Insert fields into frontmatter (preserve existing structure)
            if needs_title_en:
              safe = t_val.replace('"', '\\"')
              fm_text = insert_after(fm_text, 'title', f'title_en: "{safe}"')
            if needs_from_en:
              safe = f_val.replace('"', '\\"')
              fm_text = insert_after(fm_text, 'from', f'from_en: "{safe}"')
            if needs_body_en and b_match:
              b_val = b_match.group(1).strip()
              indented = '\n'.join(('  ' + l) if l.strip() else '' for l in b_val.splitlines())
              fm_text = fm_text.rstrip('\n') + '\nbody_en: |\n' + indented

            new_raw = f'---\n{fm_text}\n---\n\n{body}\n'
            with open(filepath, 'w', encoding='utf-8') as f:
              f.write(new_raw)
            print(f'  [DONE] {filepath}')

          PYEOF

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/capsule/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "auto-translate: add English translations for capsule letters"
            git pull --rebase
            git push
          fi
