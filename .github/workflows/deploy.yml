name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [private-content-update]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check private repo token
        id: check_token
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -n "$PRIVATE_REPO_TOKEN" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::PRIVATE_REPO_TOKEN not set — private content section will be empty"
          fi

      - name: Checkout private content
        if: steps.check_token.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: Yunze229/yunze-private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: .private-src

      - name: Stage private content into Hugo tree
        if: steps.check_token.outputs.available == 'true'
        run: |
          # Ensure all target dirs exist (the public repo may have only _index.md
          # checked in, so the directories may be missing on a fresh checkout).
          mkdir -p content/posts content/private content/learning
          mkdir -p data/translations
          mkdir -p static/images/uploads

          shopt -s nullglob
          POSTS_PUB=0
          POSTS_PRIV=0
          LEARNING_COUNT=0
          IMAGE_DIRS=0
          TRANS_COUNT=0
          DATA_COUNT=0

          # Distribute posts by `make_public` flag.
          # (Hugo reserves `published` as a date field — using a custom name avoids
          # the "not a parsable date" build error.)
          # make_public: true -> content/posts/  (public, no encryption)
          # otherwise         -> content/private/ (encrypted at end of build)
          for f in .private-src/posts/*.md; do
            if grep -qE '^make_public:[[:space:]]*true' "$f"; then
              cp "$f" content/posts/
              POSTS_PUB=$((POSTS_PUB+1))
            else
              cp "$f" content/private/
              POSTS_PRIV=$((POSTS_PRIV+1))
            fi
          done

          # Learning notes — always draft:true, Hugo skips them.
          # Kept in tree so admin can list them, but no HTML is generated.
          for f in .private-src/learning/*.md; do
            cp "$f" content/learning/
            LEARNING_COUNT=$((LEARNING_COUNT+1))
          done

          # Image uploads — copy whole tree so {{slug}} subdirs preserved.
          if [ -d .private-src/images/uploads ]; then
            mkdir -p static/images/uploads
            cp -R .private-src/images/uploads/. static/images/uploads/
            IMAGE_DIRS=$(find .private-src/images/uploads -mindepth 1 -maxdepth 1 -type d | wc -l)
          fi

          # AI translations
          if [ -d .private-src/data/translations ]; then
            mkdir -p data/translations
            for f in .private-src/data/translations/*.yaml; do
              cp "$f" data/translations/
              TRANS_COUNT=$((TRANS_COUNT+1))
            done
          fi

          # Individual data yaml files
          for name in nav books gears travel skills; do
            if [ -f ".private-src/data/$name.yaml" ]; then
              cp ".private-src/data/$name.yaml" "data/$name.yaml"
              DATA_COUNT=$((DATA_COUNT+1))
            fi
          done

          # AI review notes (data/reviews/*.md) intentionally NOT copied here.
          # They're consumed by the CMS admin's 'reviews' collection, which
          # reads directly from the private repo via the Sveltia GitHub
          # backend — no main-repo deploy needed. Hugo would also choke on
          # them anyway (data/ only accepts json/yaml/toml).

          shopt -u nullglob
          echo "Staged: $POSTS_PUB published posts, $POSTS_PRIV private posts, $LEARNING_COUNT learning notes, $IMAGE_DIRS image dirs, $TRANS_COUNT translations, $DATA_COUNT data files."

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.1"
          extended: false

      - name: Build
        run: hugo --minify

      - name: Encrypt private posts
        env:
          PRIVATE_PASS: ${{ secrets.PRIVATE_PASS }}
        run: |
          if [ -z "$PRIVATE_PASS" ]; then
            echo "PRIVATE_PASS not set — skipping"
            exit 0
          fi
          ENCRYPTED=0
          encrypt_page() {
            local PAGE="$1" SLUG="$2"
            if [ ! -f "$PAGE" ]; then
              echo "[SKIP] $SLUG: $PAGE not found"
              return 0
            fi
            local TMPDIR=$(mktemp -d)
            npx --yes staticrypt@3 "$PAGE" --password "$PRIVATE_PASS" --short -d "$TMPDIR" 2>&1
            if [ -f "$TMPDIR/index.html" ]; then
              cp "$TMPDIR/index.html" "$PAGE"
              echo "[ENCRYPTED] $SLUG"
              ENCRYPTED=$((ENCRYPTED+1))
            else
              echo "[ERROR] $SLUG: encrypted file not found in $TMPDIR"
              rm -rf "$TMPDIR"
              exit 1
            fi
            rm -rf "$TMPDIR"
          }
          # Every file under content/private/ is private — encrypt all rendered pages.
          shopt -s nullglob
          for f in content/private/*.md; do
            [ "$(basename "$f")" = "_index.md" ] && continue
            SLUG=$(basename "$f" .md)
            FM_SLUG=$(grep "^slug:" "$f" | head -1 | sed "s/^slug:[ '\"]*//;s/[ '\"]*$//")
            [ -n "$FM_SLUG" ] && SLUG="$FM_SLUG"
            encrypt_page "public/private/$SLUG/index.html" "$SLUG"
          done
          shopt -u nullglob
          echo "Done. $ENCRYPTED private posts encrypted."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger Newsletter Broadcast
        run: |
          curl -X POST https://capsule.duyunze.com/broadcast \
            -H "Content-Type: application/json" \
            -d '{"secret": "${{ secrets.BROADCAST_SECRET }}"}'
