name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.1"
          extended: false

      - name: Build
        run: hugo --minify

      - name: Encrypt private posts
        env:
          PRIVATE_PASS: ${{ secrets.PRIVATE_PASS }}
        run: |
          if [ -z "$PRIVATE_PASS" ]; then
            echo "PRIVATE_PASS not set — skipping"
            exit 0
          fi
          ENCRYPTED=0
          for f in content/posts/*.md; do
            if grep -q "^private: true" "$f"; then
              SLUG=$(basename "$f" .md)
              # Check for slug: override in frontmatter
              FM_SLUG=$(grep "^slug:" "$f" | head -1 | sed "s/^slug:[ '\"]*//;s/[ '\"]*$//")
              [ -n "$FM_SLUG" ] && SLUG="$FM_SLUG"
              PAGE="public/posts/$SLUG/index.html"
              if [ ! -f "$PAGE" ]; then
                echo "[SKIP] $SLUG: $PAGE not found"
                continue
              fi
              TMPDIR=$(mktemp -d)
              npx --yes staticrypt@3 "$PAGE" --password "$PRIVATE_PASS" --short -d "$TMPDIR" 2>&1
              if [ -f "$TMPDIR/index.html" ]; then
                cp "$TMPDIR/index.html" "$PAGE"
                echo "[ENCRYPTED] $SLUG"
                ENCRYPTED=$((ENCRYPTED+1))
              else
                echo "[ERROR] $SLUG: encrypted file not found in $TMPDIR"
                exit 1
              fi
              rm -rf "$TMPDIR"
            fi
          done
          echo "Done. $ENCRYPTED posts encrypted."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger Newsletter Broadcast
        run: |
          curl -X POST https://yunze-capsule.dyz229.workers.dev/broadcast \
            -H "Content-Type: application/json" \
            -d '{"secret": "${{ secrets.BROADCAST_SECRET }}"}'
