name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.1"
          extended: false

      - name: Build
        run: hugo --minify

      - name: Encrypt private posts
        env:
          PRIVATE_PASS: ${{ secrets.PRIVATE_PASS }}
        run: |
          python3 << 'PYEOF'
          import os, re, subprocess, sys

          password = os.environ.get('PRIVATE_PASS', '').strip()
          if not password:
              print('PRIVATE_PASS not set — skipping encryption')
              sys.exit(0)

          posts_dir = 'content/posts'
          public_dir = 'public/posts'
          encrypted = 0

          for fname in sorted(os.listdir(posts_dir)):
              if not fname.endswith('.md'):
                  continue
              with open(os.path.join(posts_dir, fname)) as f:
                  content = f.read()
              if not re.search(r'^private:\s*true', content, re.MULTILINE):
                  continue
              slug_m = re.search(r'^slug:\s*["\']?([^\s"\']+)["\']?', content, re.MULTILINE)
              slug = slug_m.group(1) if slug_m else fname[:-3]
              page = os.path.join(public_dir, slug, 'index.html')
              if not os.path.exists(page):
                  print(f'[SKIP] {slug}: built page not found')
                  continue
              import tempfile, shutil
              tmp_dir = tempfile.mkdtemp()
              tmp_out = os.path.join(tmp_dir, 'index.html')
              r = subprocess.run(
                  ['npx', '--yes', 'staticrypt@3', page,
                   '--password', password, '-o', tmp_out],
                  capture_output=True, text=True
              )
              if r.returncode == 0 and os.path.exists(tmp_out) and os.path.getsize(tmp_out) > 0:
                  shutil.copy(tmp_out, page)
                  print(f'[ENCRYPTED] {slug}')
                  encrypted += 1
              else:
                  print(f'[ERROR] {slug}: rc={r.returncode} stdout={r.stdout[:200]} stderr={r.stderr[:200]}')
                  sys.exit(1)
              shutil.rmtree(tmp_dir, ignore_errors=True)

          print(f'Done. {encrypted} private posts encrypted.')
          PYEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Trigger Newsletter Broadcast
        run: |
          curl -X POST https://yunze-capsule.dyz229.workers.dev/broadcast \
            -H "Content-Type: application/json" \
            -d '{"secret": "${{ secrets.BROADCAST_SECRET }}"}'
