  ***

  <a name="what"></a>

  ## 🌟 第一部分：什么是彩色玻璃焊接？

  ## 

  彩色玻璃焊接就是一种手工艺——把好多块小的彩色玻璃拼成一幅画！做法是把每一块玻璃的边缘用铜箔胶带包起来，然后用熔化的焊锡把它们粘在一起。我们要学的这个方法叫**蒂凡尼法**（也叫"铜箔法"），是一个叫路易斯·康福特·蒂凡尼的人在1800年代末发明的。蒂凡尼台灯和很多好看的彩色玻璃装饰品，用的都是这个方法——虽然做的东西大小不一样，但原理是完全一样的！

  > 🎨 **小知识：** 你在圣家堂这些大教堂里看到的那些超酷的彩窗，用的是另一种更古老的方法，叫**铅条法**——更重、更结实，专门用来做大窗户的。我们学的铜箔法更轻，可以做更精细的图案，特别适合做小挂件和装饰品这类东西！

  ***

  <a name="why"></a>

  ## 💎 第二部分：为什么要试试彩色玻璃焊接？

  这可不是普通的儿童手工！彩色玻璃焊接超级特别，因为它需要好多种不同的技能：

  1. **全身感官都要用上** —— 你要划玻璃、掰玻璃、磨玻璃、包铜箔、上焊锡，每一步都要用不同的身体部位和感官！
  2. **真正的材料科学** —— 你会亲眼看到为什么焊锡粘不住玻璃，为什么铜要用助焊剂，为什么温度很重要。这是一节你可以用手摸到的化学课！
  3. **做出来的东西真的很美** —— 不像纸手工会被塞进抽屉里，彩色玻璃作品可以挂起来当传家宝，在阳光下闪闪发光，能用几十年！
  4. **训练精准和耐心** —— 切玻璃要手稳有耐心，焊接要集中注意力。这些技能在很多地方都用得上，比如做手术、搞工程、射箭等等。
  5. **入门简单，上限超高** —— 初学者3小时就能做完一个小作品；但如果你一直练下去，高手做的蒂凡尼台灯可以卖到好几十万！

  > 👦 **真实案例：** 一个10岁的初学者（就是我！）在第一次上课的3小时里做出了**3个作品**——一个贝壳和两条小鱼。虽然不完美，但是真的做出来了，可以展示的，而且是我自己做的！

  ***

  <a name="materials"></a>

  ## 🧰 第三部分：材料和工具

  ### 🪟 玻璃和图案

  | 物品 | 用途 | 初学者小贴士 |
  | --- | --- | --- |
  | **彩色玻璃片** | 主要材料 | 先选不透明或半透明的玻璃——比透明玻璃更好划 |
  | **纸质图案** | 裁切的模板 | 第一个作品选5到10块的图案就好 |
  | **固体胶棒** | 把纸粘到玻璃上 | Elmer's水溶胶是标准款 |
  | **油性记号笔** | 在玻璃上描线 | 黑色Sharpie细头款 |

  ### ✂️ 裁切和整形

  | 物品 | 用途 | 初学者小贴士 |
  | --- | --- | --- |
  | **玻璃划线刀** | 在玻璃表面划出裂纹线 | 手枪握式的小朋友用起来最顺手 |
  | **掰断钳** | 沿着划线掰断玻璃 | 找钳口有包塑料的那种 |
  | **切割垫** | 保护桌面 | 带格子的自愈型切割垫 |
  | **磨玻璃机** | 磨平尖锐的边缘 | 带水槽的电动磨机最安全 |
  | **护目镜** | 保护眼睛不被玻璃碎片伤到 | **这个绝对不能省！** |
  | **防割手套** | 切玻璃时保护手 | 粉色的看起来很可爱，效果一样好😄 |

  ### 🔥 包铜箔和焊接

  | 物品 | 用途 | 初学者小贴士 |
  | --- | --- | --- |
  | **铜箔胶带** | 包裹玻璃边缘，让焊锡能粘上去 | 7/32英寸宽的适合大多数作品 |
  | **压边工具（骨刀）** | 把铜箔压紧贴在玻璃上 | 用汤匙柄代替也可以 |
  | **助焊剂** | 清洁铜面，让焊锡能牢固附着 | 液态助焊剂加小刷子 |
  | **焊锡丝** | 形成连接各块玻璃的金属"骨架" | 60/40锡铅焊锡是经典款 |
  | **电烙铁** | 熔化焊锡 | 80到100瓦可调温的，温度设在约400°C |
  | **烙铁架+海绵** | 安全放置热烙铁；清洁烙铁头 | 使用前把海绵弄湿 |

  ***

  <a name="how"></a>

  ## 🛠️ 第四部分：8个步骤教程

  ## ⏱️ **总共需要：** 小型初学者作品约3小时

  ***

  ### **第一步：剪出纸质图案**

  把你的设计打印或复印到普通纸上，用剪刀沿着每一块图案的**内侧**线剪下来（不是外侧——这样最后拼出来的尺寸才对）。用固体胶把每块纸样粘到你选好的那块彩色玻璃上。胶不要涂太多——等一下还要把纸揭下来的。

  > 💡 **高手技巧：** 粘之前，先把所有纸样在玻璃上摆一摆，规划好每块用什么颜色。一旦粘上去就没法改了哦。

  ***

  ### **第二步：描线**

  用细头油性记号笔，沿着每块纸样的边缘直接在玻璃上描线。要画得精准——这些线就是你要切的地方。在每块玻璃上写上编号（1、2、3……），这样之后可以照顺序拼回去。描完线后，把纸揭掉。

  > ⚠️ **常见错误：** 很多初学者忘了写编号，结果根本不知道哪块该放哪里。这一步千万别偷懒！

  ***

  ### **第三步：划玻璃**

  戴上**护目镜和防割手套**。像拿笔一样拿着划线刀，垂直于玻璃面。用力压下去，沿着描好的线**一气划到底**——你应该能听到一种轻轻的"嚓"的声音（就像撕纸一样）。**同一条线绝对不要划两次**——这样会让刀变钝，玻璃也不容易掰断。

  > 🎯 **听声辨好坏：** 好的划线声音像撕丝绸。不好的划线要么"吱吱"叫（太用力了），要么几乎没声音（力道不够）。要找那种撕丝绸的声音！

  ***

  ### **第四步：沿划线掰断玻璃**

  用掰断钳（或者简单的弯折直接用手），沿着划线施力。玻璃应该会干净利落地断开。把钳子**平行**于划线放好，钳子上的小标记对准划线，然后稳稳用力——**不要猛掰**。

  > 🔬 **科学原理：** 第三步划线的时候，你已经在玻璃上制造了一条可控的"弱点"。掰断不是"打破"玻璃——而是引导玻璃沿着阻力最小的路径裂开。

  ***

  ### **第五步：清洗玻璃片**

  把所有切好的玻璃片拿到水槽边，用流水和一滴洗洁精冲洗干净。这样可以去掉玻璃粉末、记号笔残留和手上的油脂。**不用担心把Sharpie编号洗掉**——在后续步骤中它们自然会淡掉，就算有残留也会被铜箔盖住。

  > 🧼 **为什么要洗：** 玻璃边缘留着粉尘或油脂，铜箔就粘不牢。玻璃干净了→铜箔粘得紧→焊锡粘得牢。

  ***

  ### **第六步：磨平边缘**

  把每块玻璃**平着**靠在磨玻璃机的磨头上，轻轻往前推。水槽可以给磨头降温，也能接住玻璃粉尘。目标是：磨掉每一处尖锐的边缘，如果形状跟图案不太符合，也趁这时候修一修。**手指要和磨头保持至少2到3厘米的距离。**

  > ⏳ **别急：** 这一步很烦，但很重要。尖锐的边缘在之后处理铜箔的时候真的会割破手。每条边大概磨30到60秒。

  ***

  ### **第七步：包铜箔 + 涂助焊剂**

  这一步其实分两个小步骤。

  **小步骤7a——包铜箔：** 撕开铜箔胶带的背纸，把它包在每块玻璃的边缘。铜箔要**对准**玻璃边的中间，这样前面和后面折过来的量是一样的。用手指（或压边工具）把它压紧——不能有气泡，不能有皱褶。

  **小步骤7b——涂助焊剂：** 所有玻璃都包好铜箔、按设计排列好之后，用刷子把助焊剂（黄色的液体）薄薄地涂在**所有铜面上**。助焊剂能在化学层面清洁铜面，让焊锡真正能粘上去。

  > 🔬 **材料科学课：** 焊锡❌粘不住玻璃。焊锡❌直接也粘不住铜。焊锡✅只能粘住涂了助焊剂的铜。整个链条是：**玻璃 → 铜箔 → 助焊剂 → 焊锡。** 少了任何一步，什么都做不成！

  ***

  ### **第八步：焊接接缝**

  把电烙铁预热到大约**400°C**。把焊锡丝的头碰到两块玻璃相接的铜面接缝处，再用烙铁去熔化它——焊锡会像水一样顺着涂了助焊剂的铜面流动。要稳稳地移动，不要停在一个地方太久（会让玻璃过热然后裂开）。把整个作品都焊一遍，然后**小心翻面，焊背面**。焊好后用肥皂水清洗，去除助焊剂残留。

  > ⚠️ **超重要安全警告：** 烙铁有约400°C。熔化的焊锡液滴可能会溅到桌上，而且**就算看起来凝固了，可能还有好几分钟是危险的高温**。绝对不要碰刚滴下来的焊锡。**大人也会被烫伤。** 等一会儿，再多等一会儿。

  ***

  <a name="mistakes"></a>

  ## ❌ 第五部分：初学者常见错误

  这是一个小小的排错指南，这些问题你几乎肯定都会遇到：

  **1. 焊锡变成一粒一粒的，不能顺滑流动。** → 助焊剂涂太少了，或者铜面氧化了。重新涂一遍助焊剂再试。

  **2. 焊接的时候玻璃裂了。** → 烙铁停在一个地方太久了。要一直移动——想象成"刷漆"，不是"点点"。

  **3. 切好的玻璃片拼不起来。** → 要么是划线的时候不够精准，要么是磨得不够。回去磨玻璃机那边，把高出来的部分再磨掉。

  **4. 铜箔老是从玻璃上翘起来。** → 玻璃边缘没洗干净。用肥皂水重新洗，完全晾干后重新包铜箔。

  **5. 焊锡线看起来坑坑洼洼的，很难看。** → 很可能是焊锡用太多了，或者烙铁温度不够。好的焊锡线应该是**光滑、微微隆起**的，像一条细细的银色珠子。用湿海绵擦干净烙铁头，少用点焊锡再试一次。

  ***

  <a name="safety"></a>

  ## 🦺 第六部分：安全第一

  用玻璃和400°C的工具时，这些规则一定要遵守：

  ✅ **切玻璃、磨玻璃或焊接时，必须戴护目镜。**

  ✅ **拿未处理的玻璃时，要戴防割手套。**

  ✅ **把长头发扎起来，不要穿宽松的袖子，焊接时周围不能有易燃物。**

  ✅ **在通风的地方工作——助焊剂和焊锡的烟雾有轻微毒性。**

  ✅ **每次做完之后，尤其是吃东西前，要把手洗干净。** 铅基焊锡这一点很重要。

  ✅ **8岁以下的孩子不应该使用电烙铁。** 8到10岁必须**全程有大人在旁边**；11岁以上可以自己操作大部分步骤，大人定期看一下就好。

  ✅ **旁边要备好急救包。** 小划伤和小烫伤是学这门手艺的一部分——就算是有经验的大人也会受伤。

  ***

  <a name="faq"></a>

  ## ❓ 第七部分：常见问题

  **问：做完一件作品要多久？** **答：** 一件小的初学者作品（5到10块玻璃）包含所有8个步骤大概需要3小时。中等大小的作品（15到30块）需要6到10小时，通常分两次来做。

  ***

  **问：入门套装要花多少钱？** **答：** 完整的初学者套装（玻璃、划线刀、磨玻璃机、铜箔、助焊剂、焊锡、烙铁）大概需要**150到250美元**。很多工作室上课时所有材料都包含在课费里（大概60到100美元一次课），想先试试的话这样更划算。

  ***

  **问：小孩做这个安全吗？** **答：** 有大人在旁边监督的话，是安全的。最常见的两种受伤是小划伤（被没磨平的边缘割到）和小烫伤（热焊锡）。两种都好得很快。而且这个过程能培养专注力、耐心和精细动作控制——这些都是很有价值的能力。

  ***

  **问：去哪里找工作室？** **答：** 在谷歌或Yelp上搜索"stained glass classes near me（我附近的彩色玻璃课）"就可以。如果你在南加州，欧文市的**Softland Studio**有专门针对小孩和大人的初学者课程。

  ***

  **问：可以不上课直接在家做吗？** **答：** 技术上可以，但我很不建议这样做。电烙铁和玻璃划线刀都有一个学习曲线，有老师手把手教会上手快很多。先**上一次工作室的课**，如果爱上它了再买家用套装！

  ***

  ## 🎁 彩蛋：按难度分类的作品创意

  **🟢 初级（3小时，5到8块玻璃）：**

  - 简单形状：爱心、星星、叶子、小鱼、贝壳、蝴蝶

  **🟡 中级（6到10小时，10到25块玻璃）：**

  - 几何曼陀罗、多瓣花朵、小动物（鲸鱼、狐狸、猫头鹰）

  **🔴 高级（20小时以上，50块以上）：**
  - 蒂凡尼风格灯罩、大型阳光捕手、人像作品、三维立体雕塑

  ***

