  超级感谢**FeiFei**老师教我——她超级有耐心，还一直确保我不会烫到自己（结果只有我妈妈被烫到了😅）。如果你去的话，告诉她是云泽介绍你去的！

  ***

  _谢谢你看完！如果你也试过彩色玻璃，你做了什么呢？在评论里告诉我吧！_
