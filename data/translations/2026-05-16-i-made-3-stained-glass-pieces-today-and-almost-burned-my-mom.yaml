title: "我今天做了3个彩色玻璃作品！"
content: |
  今天我去上了一节彩色玻璃课。我做了**两条鱼和一个蛤蜊**——一共三个作品！虽然都挺小的，但真的超级超级好玩！

  在我讲怎么做之前，我想先说**今天学到的两件最重要的事情**。如果你以后也想试试彩色玻璃，一定要记住这两点！

  ***

  ## ⚠️ 重要的事情 #1：烙铁真的真的很烫！

  用烙铁的时候——它就像一支能把金属融化掉的金属笔——你要非常非常小心。它真的很烫很烫。

  我妈妈不小心碰到了一滴还没冷掉的融化金属，结果被烫伤了。我觉得那个铁大概有**400度**左右吧。所以就算那些金属滴到桌子上、看起来好像没事了，它**还是超级烫**。不要去碰！要等很久很久才能碰任何东西。

  这是最最重要的规则。我是认真的！

  ***

  ## 🔬 重要的事情 #2：金属其实根本粘不到玻璃上

  这个发现真的把我吓到了。

  那个融化的金属（叫做**焊料**）根本粘不到玻璃上。它只能粘在**铜**上面。所以在焊接之前，你必须先把**铜箔胶带**包在每一块玻璃的边缘上。

  还有一件事——焊料也不能直接粘在铜上面。你还要先在铜上面涂一种叫**助焊剂**的东西。助焊剂是一种黄色的液体，用小刷子刷上去。没有助焊剂的话，焊料就会像水珠在叶子上一样滚来滚去，粘不住。有了助焊剂，它就能完美地粘上去啦！

  所以顺序是这样的：

  > **玻璃 → 铜箔胶带 → 助焊剂 → 焊料**

  少了任何一步都没办法做成功的！

  ***

  ## 🎨 我是怎么做出这三个作品的

  ![](/images/uploads/IMG_6223.jpeg)

  好啦，现在让我来给你讲整个过程！

  **第一步——描形状。** 首先，我们用马克笔把形状描到玻璃上。工作室里的玻璃真的很漂亮——有好多好多颜色，看起来像漩涡一样，闪闪发光。我给我的蛤蜊选了浅蓝色，因为它看起来像大海。

  **第二步——切割。** 然后我把玻璃切成一块一块的。我们不是用剪刀剪的——我们用了一种特别的工具，先在玻璃上划一条线，然后沿着那条线把玻璃掰断。**啪！** 第一次的时候有点吓到我，但是试了几次之后我就找到感觉了。

  ![](/images/uploads/IMG_6227.jpeg)

  **第三步——打磨。** 切完之后，我要在一个小小的打磨轮上把毛糙的边缘磨平。

  **第四步——清洗和贴铜箔胶带。** 然后把玻璃洗干净、擦干，再把每条边都贴上铜箔胶带。贴铜箔胶带这一步花了好好好长时间。我的手指都累坏了。

  **第五步——涂助焊剂和焊接。** 然后就到了最好玩的部分——用那支热笔（就是烙铁）！我先把助焊剂涂在铜上，然后沿着所有的线把焊料融化上去。焊料冷掉之后变成银色的，亮亮的。看起来就像玻璃有了一副金属骨架把它们都撑在一起一样！

  ![](/images/uploads/IMG_6229.jpeg)

  ![](/images/uploads/IMG_6230.jpeg)

  ***

  ## 💎 做好的作品

  我做了：

  - 🐚 **一个蛤蜊**
  - 🐠 **两条小鱼**

  它们都很小，但我真的超级开心。做完之后我累得不行——我觉得我大概做了**3个小时**。但是当我把它们举起来对着光看，看到它们在发光的时候，感觉一切都值了！

  做完之后我真的好开心好开心。

  ![](/images/uploads/IMG_6222.jpeg)

  ***

  ## 🧠 如果你也想试试，我的建议是

  1. **不要怕那支热笔**——只要小心地用它就好。
  2. **贴铜箔胶带的时候要耐心**——这一步最烦人，但也是最重要的。
  3. **相信助焊剂**——就算感觉焊料粘不上去，助焊剂会搞定的。

  我觉得我下次想做一头**鲸鱼**！🐋

  ***

