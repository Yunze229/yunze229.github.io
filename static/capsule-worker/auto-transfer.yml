# Place this file at: hxz49/yunze-letters/.github/workflows/auto-transfer.yml
# Secrets needed in hxz49/yunze-letters:
#   MAIN_REPO_TOKEN  – PAT with contents:write on Yunze229/yunze229.github.io
#   RESEND_API_KEY   – for notification emails

name: Auto Transfer Unlocked Letters

on:
  push:
    branches: [main]
    paths:
      - 'letters/**.md'   # triggers immediately when Worker adds a new letter
  schedule:
    - cron: '0 16 * * *'   # 16:00 UTC = midnight Asia/Shanghai
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync letters to main site
        env:
          MAIN_REPO_TOKEN: ${{ secrets.MAIN_REPO_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, base64, urllib.request, urllib.error
          from datetime import datetime, timezone, timedelta

          MAIN_REPO  = 'Yunze229/yunze229.github.io'
          NOTIFY_TO  = 'hxz49@hotmail.com'
          FROM_EMAIL = 'onboarding@resend.dev'

          main_token = os.environ['MAIN_REPO_TOKEN']
          resend_key = os.environ['RESEND_API_KEY']

          TZ_MAP = {
              'Asia/Shanghai':       timedelta(hours=8),
              'America/Los_Angeles': timedelta(hours=-7),
          }

          def gh_request(method, url, data=None):
              req = urllib.request.Request(url, method=method)
              req.add_header('Authorization', f'Bearer {main_token}')
              req.add_header('Content-Type', 'application/json')
              req.add_header('User-Agent', 'yunze-capsule-transfer')
              body = json.dumps(data).encode() if data else None
              try:
                  with urllib.request.urlopen(req, body) as r:
                      return r.status, json.loads(r.read())
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read())

          def gh_put_file(path, content_str, message):
              url = f'https://api.github.com/repos/{MAIN_REPO}/contents/{path}'
              status, existing = gh_request('GET', url)
              sha = existing.get('sha') if status == 200 else None
              encoded = base64.b64encode(content_str.encode()).decode()
              payload = {'message': message, 'content': encoded}
              if sha:
                  payload['sha'] = sha
              status, result = gh_request('PUT', url, payload)
              return status, result

          def send_email(subject, html):
              req = urllib.request.Request('https://api.resend.com/emails', method='POST')
              req.add_header('Authorization', f'Bearer {resend_key}')
              req.add_header('Content-Type', 'application/json')
              try:
                  urllib.request.urlopen(req, json.dumps({
                      'from': FROM_EMAIL, 'to': NOTIFY_TO,
                      'subject': subject, 'html': html
                  }).encode())
              except Exception as e:
                  print(f'Email error: {e}')

          def today_for_tz(tz_name):
              delta = TZ_MAP.get(tz_name, timedelta(hours=8))
              return (datetime.now(timezone.utc) + delta).date().isoformat()

          def get_existing_fields(path):
              """Return dict with title_en, revealed, read_by_admin, has_body from the existing main-repo file."""
              url = f'https://api.github.com/repos/{MAIN_REPO}/contents/{path}'
              status, data = gh_request('GET', url)
              result = {'title_en': None, 'revealed': False, 'read_by_admin': False, 'has_body': False}
              if status == 200 and 'content' in data:
                  existing = base64.b64decode(data['content']).decode()
                  m = re.search(r'^title_en:\s*["\']?(.*?)["\']?\s*$', existing, re.MULTILINE)
                  if m:
                      result['title_en'] = m.group(1).strip()
                  result['revealed']      = bool(re.search(r'^revealed:\s*true\s*$', existing, re.MULTILINE))
                  result['read_by_admin'] = bool(re.search(r'^read_by_admin:\s*true\s*$', existing, re.MULTILINE))
                  # Detect whether existing file is a full transfer (has body) vs stub (empty body)
                  body_m = re.match(r'^---\n.*?\n---\n?(.*)', existing, re.DOTALL)
                  if body_m and body_m.group(1).strip():
                      result['has_body'] = True
              return result

          letters_dir = 'letters'
          if not os.path.isdir(letters_dir):
              print('No letters directory found.')
              exit(0)

          full_transfers = []
          any_private_changes = False
          had_transfer_errors = False

          for fname in sorted(os.listdir(letters_dir)):
              if not fname.endswith('.md') or fname == '.gitkeep':
                  continue
              fpath = os.path.join(letters_dir, fname)
              with open(fpath) as f:
                  raw = f.read()

              m = re.match(r'^---\n(.*?)\n---\n?(.*)', raw, re.DOTALL)
              if not m:
                  continue
              fm_text, body = m.group(1), m.group(2).strip()

              def fm_get(key):
                  r = re.search(rf'^{key}:\s*["\']?(.*?)["\']?\s*$', fm_text, re.MULTILINE)
                  return r.group(1).strip() if r else ''

              if fm_get('transferred') == 'true':
                  continue

              title        = fm_get('title')
              from_person  = fm_get('from')
              unlock_date  = fm_get('unlock_date')
              date_written = fm_get('date')
              tz_name      = fm_get('tz') or 'Asia/Shanghai'
              show_preview = fm_get('show_preview') != 'false'
              tags_m       = re.search(r'^tags:\s*\[(.*?)\]', fm_text, re.MULTILINE)
              tags         = tags_m.group(1) if tags_m else ''

              today      = today_for_tz(tz_name)
              is_unlocked = unlock_date <= today

              # Use private-repo filename as slug so stub and full transfer use the same path
              slug        = fname[:-3]
              target_path = f'content/capsule/{slug}.md'

              if is_unlocked:
                  # Full transfer: include body content
                  existing = get_existing_fields(target_path)
                  title_en = existing['title_en']
                  # Preserve revealed if already set via CMS
                  # Only preserve read_by_admin if it was set on a previous full transfer (not a stub)
                  revealed_val   = 'true' if existing['revealed'] else 'false'
                  read_admin_val = 'true' if (existing.get('read_by_admin') and existing.get('has_body')) else 'false'
                  fm_lines = ['---', f'title: "{title}"']
                  if title_en:
                      fm_lines.append(f'title_en: "{title_en}"')
                  fm_lines += [
                      f'date: {date_written}',
                      f'unlock_date: "{unlock_date}"',
                      f'from: "{from_person}"',
                      f'tags: [{tags}]',
                      f'read_by_admin: {read_admin_val}',
                      f'revealed: {revealed_val}',
                      '---', '', body,
                  ]
                  new_content = '\n'.join(fm_lines)
                  status, result = gh_put_file(
                      target_path, new_content,
                      f'capsule: transfer letter from {from_person} (unlocks {unlock_date})'
                  )
                  if status in (200, 201):
                      print(f'  [TRANSFER] {fname}')
                      full_transfers.append({'from': from_person, 'title': title, 'unlock_date': unlock_date, 'body': body})
                      # Mark as transferred in private repo
                      with open(fpath, 'w') as f:
                          f.write(raw.replace('transferred: false', 'transferred: true'))
                      any_private_changes = True
                      # Send individual email with full body so admin can read before revealing
                      body_html = body.replace('\n', '<br>')
                      send_email(
                          f'📬 时光胶囊开封：{from_person}写给Yunze — {title}',
                          f'<p>一封写给 Yunze 的信已到达开封日。</p>'
                          f'<p><strong>来自：</strong>{from_person}<br>'
                          f'<strong>标题：</strong>{title}<br>'
                          f'<strong>开封日：</strong>{unlock_date}</p>'
                          f'<hr>'
                          f'<div style="white-space:pre-wrap;font-family:serif;font-size:1rem;line-height:1.8">{body_html}</div>'
                          f'<hr>'
                          f'<p style="color:#888;font-size:0.9em">读完信件内容后，请登录 <a href="https://yunze229.github.io/admin/">CMS 后台</a> 勾选「确认已读」，再决定是否公开到博客。</p>'
                      )
                  else:
                      print(f'  [ERROR] full transfer {fname}: HTTP {status} — {result}')
                      had_transfer_errors = True

              elif show_preview:
                  # Stub only: title/sender/dates visible, no body content
                  existing = get_existing_fields(target_path)
                  title_en = existing['title_en']
                  stub_lines = ['---', f'title: "{title}"']
                  if title_en:
                      stub_lines.append(f'title_en: "{title_en}"')
                  stub_lines += [
                      f'date: {date_written}',
                      f'unlock_date: "{unlock_date}"',
                      f'from: "{from_person}"',
                      'revealed: false',
                      '---', '',
                  ]
                  stub_content = '\n'.join(stub_lines)
                  status, result = gh_put_file(
                      target_path, stub_content,
                      f'capsule: add locked stub — {from_person} → {unlock_date}'
                  )
                  if status in (200, 201):
                      print(f'  [STUB] {fname}')
                  else:
                      print(f'  [ERROR] stub {fname}: HTTP {status} — {result}')

              else:
                  print(f'  [SKIP] {fname}: locked, show_preview=false')

          # Commit private repo changes (transferred: true marks)
          if any_private_changes:
              os.system('git config user.name "yunze-capsule-bot"')
              os.system('git config user.email "bot@yunze229.github.io"')
              os.system('git add letters/')
              os.system('git commit -m "mark letters as transferred" || true')
              os.system('git push')

          print(f'Done. {len(full_transfers)} full transfers, stubs synced.')
          if had_transfer_errors:
              import sys; sys.exit(1)
          PYEOF
