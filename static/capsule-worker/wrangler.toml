name = "yunze-capsule"
main = "worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

[[routes]]
pattern = "capsule.duyunze.com"
custom_domain = true

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "e7b601c5751b41d4afe7e2bab4360f17"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "yunze-media"

[ai]
binding = "AI"

# Phase E.1 — D1 database for comments. Migrations live in ./migrations/.
# Apply with: wrangler d1 migrations apply yunze-comments --remote
[[d1_databases]]
binding = "COMMENTS_DB"
database_name = "yunze-comments"
database_id = "5efb3b1a-faa5-49dc-867a-d12899e59a58"
migrations_dir = "migrations"
