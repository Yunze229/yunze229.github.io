<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ececec"/>
    </pattern>
    <style>
      .latin { font-family: "Helvetica Neue", Arial, sans-serif; }
      .cjk   { font-family: "PingFang SC", "Hiragino Sans GB", sans-serif; }
    </style>
  </defs>
  <rect width="1200" height="675" fill="#f9fafa"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <g transform="translate(600 250)">
    <g><rect x="-330" y="-60" width="120" height="120" rx="22" fill="#ffffff" stroke="#e5e3df" stroke-width="2"/>
       <text x="-270" y="18" text-anchor="middle" font-size="58" fill="#1a1a1a">✊</text>
       <text x="-270" y="50" text-anchor="middle" class="latin" font-size="20" fill="#999999">1</text></g>
    <g><rect x="-195" y="-60" width="120" height="120" rx="22" fill="#ffffff" stroke="#e5e3df" stroke-width="2"/>
       <text x="-135" y="18" text-anchor="middle" font-size="58" fill="#1a1a1a">✋</text>
       <text x="-135" y="50" text-anchor="middle" class="latin" font-size="20" fill="#999999">2</text></g>
    <g><rect x="-60" y="-60" width="120" height="120" rx="22" fill="#ffffff" stroke="#e5e3df" stroke-width="2"/>
       <text x="0" y="18" text-anchor="middle" font-size="58" fill="#1a1a1a">✌️</text>
       <text x="0" y="50" text-anchor="middle" class="latin" font-size="20" fill="#999999">3</text></g>
    <g><rect x="75" y="-60" width="120" height="120" rx="22" fill="#ffffff" stroke="#e5e3df" stroke-width="2"/>
       <text x="135" y="18" text-anchor="middle" font-size="54" fill="#1a1a1a">🦎</text>
       <text x="135" y="50" text-anchor="middle" class="latin" font-size="20" fill="#999999">4</text></g>
    <g><rect x="210" y="-60" width="120" height="120" rx="22" fill="#ffffff" stroke="#e5e3df" stroke-width="2"/>
       <text x="270" y="18" text-anchor="middle" font-size="54" fill="#1a1a1a">🖖</text>
       <text x="270" y="50" text-anchor="middle" class="latin" font-size="20" fill="#999999">5</text></g>
  </g>
  <text x="600" y="432" text-anchor="middle" class="latin" font-size="44" font-weight="700" fill="#1a1a1a" letter-spacing="1">Rock · Paper · Scissors · Lizard · Spock</text>
  <text x="600" y="488" text-anchor="middle" class="cjk" font-size="34" fill="#666666">石头 · 剪刀 · 布 · 蜥蜴 · 史波克</text>
  <text x="600" y="600" text-anchor="middle" class="latin" font-size="22" fill="#999999">Python · <tspan class="cjk">编程课</tspan> · Yunze</text>
</svg>
