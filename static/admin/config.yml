backend:
  name: github
  repo: Yunze229/yunze229.github.io
  branch: main
  base_url: https://auth.duyunze.com

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

locale: zh_Hans

collections:
  - name: "posts"
    label: "文章"
    label_singular: "文章"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}"
    media_folder: "static/images/uploads/{{slug}}"
    public_folder: "/images/uploads/{{slug}}"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
        hint: "文章标题"
      - label: "日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "分类"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - { label: "日记", value: "日记" }
          - { label: "学习笔记", value: "学习笔记" }
          - { label: "技能笔记", value: "技能笔记" }
          - { label: "旅行", value: "旅行" }
          - { label: "书单", value: "书单" }
          - { label: "作品 | PROJECTS", value: "作品" }
          - { label: "手册 | MANUALS", value: "手册" }
        default: ["日记"]
      - label: "封面图片（作品页专用）"
        name: "cover"
        widget: "image"
        required: false
        hint: "仅作品页显示，推荐 16:9 比例"
      - label: "标签"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "用回车添加标签"
      - label: "🔒 私密文章（仅自己可见）"
        name: "private"
        widget: "boolean"
        default: false
        hint: "开启后文章不会在首页和分类页出现"
      - label: "草稿"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "正文"
        name: "body"
        widget: "markdown"
        hint: "支持 Markdown 格式"
      - label: "中文标题（可选）"
        name: "title_zh"
        widget: "string"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"
      - label: "中文正文（可选）"
        name: "body_zh"
        widget: "markdown"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"

  - name: "learning"
    label: "📖 学习笔记（仅你自己可见）"
    label_singular: "学习笔记"
    folder: "content/learning"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
      - label: "日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "草稿（学习笔记永远 draft:true，不会出现在博客）"
        name: "draft"
        widget: "boolean"
        default: true
      - label: "对应日记 slug（可选）"
        name: "source_slug"
        widget: "string"
        required: false
      - label: "对应日记标题（可选）"
        name: "source_title"
        widget: "string"
        required: false
      - label: "笔记内容"
        name: "body"
        widget: "markdown"

  - name: "capsule"
    label: "时光胶囊"
    label_singular: "胶囊信件"
    folder: "content/capsule"
    create: false
    fields:
      - label: "标题（中文）"
        name: "title"
        widget: "string"
      - label: "标题（英文，可选）"
        name: "title_en"
        widget: "string"
        required: false
        hint: "不填则中英文都显示中文标题"
      - label: "写信日期"
        name: "date"
        widget: "datetime"
        type: date
        format: "YYYY-MM-DD"
      - label: "开封日"
        name: "unlock_date"
        widget: "string"
      - label: "写信人"
        name: "from"
        widget: "string"
      - label: "写信人（英文）"
        name: "from_en"
        widget: "string"
        required: false
        hint: "AI自动填写，如：Mom / Dad / Grandpa / Grandma"
      - label: "信的内容（中文）"
        name: "body"
        widget: "markdown"
        required: false
        readonly: true
      - label: "信的内容（英文）"
        name: "body_en"
        widget: "text"
        required: false
        readonly: true
      - label: "✅ 确认已读"
        name: "read_by_admin"
        widget: "boolean"
        default: false
        hint: "读完信件内容后勾选"
      - label: "🌐 公开到博客"
        name: "revealed"
        widget: "boolean"
        default: false
        hint: "确认已读后再开启；开启后信的内容会出现在博客上"

  - name: "settings"
    label: "网站设置"
    files:
      - name: "nav"
        label: "导航菜单"
        file: "data/nav.yaml"
        fields:
          - label: "菜单项"
            name: "items"
            widget: "list"
            label_singular: "菜单项"
            fields:
              - label: "中文名"
                name: "name_zh"
                widget: "string"
              - label: "英文名"
                name: "name_en"
                widget: "string"
              - label: "链接"
                name: "url"
                widget: "string"
                required: false
                hint: "有子菜单时留空"
              - label: "Section（高亮检测）"
                name: "section"
                widget: "string"
                required: false
                hint: "页面的 section 名，如 being / capsule，有子菜单时留空"
              - label: "页面描述（中文）"
                name: "desc_zh"
                widget: "string"
                required: false
                hint: "显示在页面标题下方，如：以代码记录成长的轨迹"
              - label: "页面描述（英文）"
                name: "desc_en"
                widget: "string"
                required: false
              - label: "子菜单项"
                name: "children"
                widget: "list"
                required: false
                label_singular: "子菜单项"
                fields:
                  - label: "中文名"
                    name: "name_zh"
                    widget: "string"
                  - label: "英文名"
                    name: "name_en"
                    widget: "string"
                  - label: "链接"
                    name: "url"
                    widget: "string"
                  - label: "Section（高亮检测）"
                    name: "section"
                    widget: "string"
                    required: false
                  - label: "页面描述（中文）"
                    name: "desc_zh"
                    widget: "string"
                    required: false
                    hint: "显示在页面标题下方"
                  - label: "页面描述（英文）"
                    name: "desc_en"
                    widget: "string"
                    required: false

      - name: "gears"
        label: "装备 Gears"
        file: "data/gears.yaml"
        fields:
          - label: "分类"
            name: "categories"
            widget: "list"
            label_singular: "分类"
            fields:
              - label: "分类名（中文）"
                name: "name_zh"
                widget: "string"
              - label: "分类名（英文）"
                name: "name_en"
                widget: "string"
              - label: "工具列表"
                name: "items"
                widget: "list"
                label_singular: "工具"
                fields:
                  - label: "名称"
                    name: "name"
                    widget: "string"
                  - label: "链接"
                    name: "url"
                    widget: "string"
                    required: false
                  - label: "图标类型"
                    name: "icon_type"
                    widget: "select"
                    default: "favicon"
                    options:
                      - { label: "自动抓取网站图标", value: "favicon" }
                      - { label: "Emoji", value: "emoji" }
                      - { label: "上传图片", value: "upload" }
                  - label: "Emoji（图标类型选Emoji时填）"
                    name: "icon_emoji"
                    widget: "string"
                    required: false
                  - label: "图片（图标类型选上传时填）"
                    name: "icon_image"
                    widget: "image"
                    required: false
                  - label: "一句话评价（中文）"
                    name: "desc_zh"
                    widget: "string"
                    required: false
                  - label: "一句话评价（英文）"
                    name: "desc_en"
                    widget: "string"
                    required: false
                  - label: "评分（1-5）"
                    name: "rating"
                    widget: "number"
                    value_type: "int"
                    min: 1
                    max: 5
                    required: false
                  - label: "使用状态"
                    name: "status"
                    widget: "select"
                    required: false
                    options:
                      - { label: "在用", value: "在用" }
                      - { label: "曾经用过", value: "曾经用过" }
                      - { label: "想试试", value: "想试试" }

      - name: "travel"
        label: "足迹地图"
        file: "data/travel.yaml"
        fields:
          - label: "去过的国家/地区"
            name: "countries"
            widget: "list"
            label_singular: "国家/地区"
            summary: "{{fields.name_zh}} ({{fields.code}}) — {{fields.year}}"
            fields:
              - label: "ISO 国家码"
                name: "code"
                widget: "string"
                hint: "ISO 3166-1 alpha-2，如 CN、US、JP（大写两位字母）"
              - label: "中文名"
                name: "name_zh"
                widget: "string"
              - label: "英文名"
                name: "name_en"
                widget: "string"
              - label: "首次到访年份"
                name: "year"
                widget: "number"
                value_type: "int"
                min: 1900
                max: 2100
              - label: "去过的城市（中文）"
                name: "cities_zh"
                widget: "list"
                allow_add: true
                required: false
              - label: "去过的城市（英文）"
                name: "cities_en"
                widget: "list"
                allow_add: true
                required: false
              - label: "备注（中文）"
                name: "notes_zh"
                widget: "string"
                required: false
              - label: "备注（英文）"
                name: "notes_en"
                widget: "string"
                required: false
