# Sveltia CMS — backend points at Yunze229/yunze-private (the private content repo).
# Static files (index.html, this config, voice/) live in the public main repo so the
# admin is served from duyunze.com, but every write goes to the private repo.
#
# Collections that need access to data living in the PUBLIC main repo (e.g. the
# `capsule` read-only listing for mom's letters) have been retired — reveal/keep
# decisions are now made via the magic-link buttons in the unlock emails.
backend:
  name: github
  repo: Yunze229/yunze-private
  branch: main
  base_url: https://auth.duyunze.com

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: zh_Hans

collections:
  - name: "posts"
    label: "📝 写作"
    label_singular: "文章"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}"
    media_folder: "../images/uploads/{{slug}}"
    public_folder: "/images/uploads/{{slug}}"
    thumbnail: "cover"
    summary: "{{title}} — {{#if make_public}}🌐 公开{{else}}🔒 私密{{/if}}"
    sortable_fields:
      fields: ["date", "title", "make_public"]
      default:
        field: "date"
        direction: "descending"
    fields:
      - { label: "标题", name: "title", widget: "string", hint: "文章标题" }
      - label: "🌐 公开到博客（关 = 仅自己可见，加密）"
        name: "make_public"
        widget: "boolean"
        default: false
        hint: "开 → 部署到 /posts/<slug>/ 公开；关 → /private/<slug>/ 用密码访问。Hugo 保留了 published 这个字段名，所以我们用 make_public"
      - label: "🌱 在成长时间轴显示"
        name: "timeline"
        widget: "boolean"
        default: false
        required: false
        hint: "开 → 这篇文章会作为一个节点出现在 /timeline/ 成长时间轴上（仅公开文章生效）。默认关，避免日记刷屏"
      - label: "日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "分类"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - { label: "日记", value: "日记" }
          - { label: "学习笔记", value: "学习笔记" }
          - { label: "技能笔记", value: "技能笔记" }
          - { label: "旅行", value: "旅行" }
          - { label: "书单", value: "书单" }
        default: ["日记"]
        hint: "作品和手册现在有独立标签，不再从这里选"
      - label: "标签"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "用回车添加标签"
      - label: "草稿"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "正文"
        name: "body"
        widget: "markdown"
        hint: "支持 Markdown 格式"
      - label: "中文标题（可选）"
        name: "title_zh"
        widget: "string"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"
      - label: "中文正文（可选）"
        name: "body_zh"
        widget: "markdown"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"

  - name: "projects"
    label: "🎨 作品 | PROJECTS"
    label_singular: "作品"
    folder: "projects"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "projects/{{slug}}"
    media_folder: "../images/uploads/{{slug}}"
    public_folder: "/images/uploads/{{slug}}"
    thumbnail: "cover"
    summary: "{{title}}"
    sortable_fields:
      fields: ["date", "title"]
      default:
        field: "date"
        direction: "descending"
    fields:
      - { label: "标题", name: "title", widget: "string", hint: "作品名称" }
      - label: "日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "封面图片"
        name: "cover"
        widget: "image"
        required: true
        hint: "作品卡片必须的封面，推荐 16:9 比例"
      - label: "标签"
        name: "tags"
        widget: "list"
        allow_add: true
        required: false
        hint: "用回车添加标签"
      - label: "草稿"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "正文"
        name: "body"
        widget: "markdown"
        hint: "支持 Markdown 格式；连续 ≥2 张图自动拼成横向 gallery"
      - label: "中文标题（可选）"
        name: "title_zh"
        widget: "string"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"
      - label: "中文正文（可选）"
        name: "body_zh"
        widget: "markdown"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"

  - name: "manual"
    label: "📘 手册 | MANUALS"
    label_singular: "手册"
    folder: "manual"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "manual/{{slug}}"
    media_folder: "../images/uploads/{{slug}}"
    public_folder: "/images/uploads/{{slug}}"
    summary: "{{title}}"
    sortable_fields:
      fields: ["date", "title"]
      default:
        field: "date"
        direction: "descending"
    fields:
      - { label: "标题", name: "title", widget: "string", hint: "手册名称" }
      - label: "日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "标签"
        name: "tags"
        widget: "list"
        allow_add: true
        required: false
        hint: "用回车添加标签"
      - label: "草稿"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "正文"
        name: "body"
        widget: "markdown"
        hint: "支持 Markdown 格式"
      - label: "中文标题（可选）"
        name: "title_zh"
        widget: "string"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"
      - label: "中文正文（可选）"
        name: "body_zh"
        widget: "markdown"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"

  - name: "learning"
    label: "📖 学习笔记"
    label_singular: "学习笔记"
    folder: "learning"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields:
      fields: ["date", "title"]
      default:
        field: "date"
        direction: "descending"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - label: "日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "草稿（学习笔记永远 draft:true，不构建网页）"
        name: "draft"
        widget: "boolean"
        default: true
      - { label: "对应日记 slug（可选）", name: "source_slug", widget: "string", required: false }
      - { label: "对应日记标题（可选）", name: "source_title", widget: "string", required: false }
      - { label: "笔记内容", name: "body", widget: "markdown" }

  - name: "timeline"
    label: "🌱 成长时间轴 | TIMELINE"
    label_singular: "里程碑"
    folder: "timeline"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    media_folder: "../images/uploads/{{slug}}"
    public_folder: "/images/uploads/{{slug}}"
    thumbnail: "cover"
    summary: "{{emoji}} {{title}}（{{date}}）"
    sortable_fields:
      fields: ["date", "title"]
      default:
        field: "date"
        direction: "descending"
    fields:
      - { label: "标题", name: "title", widget: "string", hint: "里程碑名称，如「学会骑自行车」" }
      - label: "日期"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: "图标 Emoji"
        name: "emoji"
        widget: "string"
        required: false
        hint: "卡片主视觉，如 🍼🎨🚲🐍。没传封面图时显示它"
      - label: "封面图片（可选）"
        name: "cover"
        widget: "image"
        required: false
        hint: "传了就用图当卡片主视觉，没传则用上面的 emoji"
      - label: "草稿"
        name: "draft"
        widget: "boolean"
        default: false
      - label: "一句话描述（可选）"
        name: "body"
        widget: "markdown"
        required: false
        hint: "卡片上的一行小字，可留空"
      - label: "中文标题（可选）"
        name: "title_zh"
        widget: "string"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"
      - label: "中文描述（可选）"
        name: "body_zh"
        widget: "markdown"
        required: false
        hint: "不填则由 AI 自动翻译；填了直接用，不再调用 AI"

  - name: "reviews"
    label: "📋 审查记录（AI 审稿）"
    label_singular: "审查"
    folder: "data/reviews"
    create: false
    extension: "md"
    identifier_field: "title"
    summary: "{{title}}"
    sortable_fields:
      fields: ["date", "title", "slug"]
      default:
        field: "date"
        direction: "descending"
    fields:
      - { label: "源文章标题", name: "title", widget: "string", readonly: true }
      - { label: "审查对应的文章 slug", name: "slug", widget: "string", readonly: true }
      - { label: "审查时间", name: "date", widget: "datetime", readonly: true }
      - { label: "AI 审稿内容", name: "body", widget: "markdown", readonly: true }

  # 时光胶囊 — 信件真身在 hxz49/yunze-letters；这里浏览/操作的是同步到
  # yunze-private/capsule/ 的副本（未到期=stub 无正文，到期=全文）。
  # 只有「公开到博客」开关可改；删除一封 = 撤下展示（触发 suppress，源信不动）。
  # create:false —— 信件只能从胶囊表单提交，后台不能凭空新建。
  - name: "capsule"
    label: "🕰️ 时光胶囊"
    label_singular: "信件"
    folder: "capsule"
    create: false
    delete: true
    extension: "md"
    identifier_field: "title"
    summary: "{{from}} → {{title}}（开封 {{unlock_date}}）"
    sortable_fields:
      fields: ["unlock_date", "date", "title"]
      default:
        field: "unlock_date"
        direction: "descending"
    fields:
      - label: "🌐 公开到博客（开 = 信件正文在 /capsule/ 公开显示）"
        name: "revealed"
        widget: "boolean"
        default: false
      - { label: "标题", name: "title", widget: "string", readonly: true }
      - { label: "英文标题", name: "title_en", widget: "string", required: false, readonly: true }
      - { label: "发信人", name: "from", widget: "string", readonly: true }
      - { label: "发信人（英文）", name: "from_en", widget: "string", required: false, readonly: true }
      - { label: "写信日期", name: "date", widget: "string", readonly: true }
      - { label: "开封日期", name: "unlock_date", widget: "string", readonly: true }
      - { label: "标签", name: "tags", widget: "list", required: false, readonly: true }
      - { label: "管理员已读", name: "read_by_admin", widget: "boolean", required: false, default: false }
      - { label: "英文正文", name: "body_en", widget: "text", required: false, readonly: true }
      - { label: "中文正文", name: "body", widget: "markdown", required: false, readonly: true }

  - name: "settings"
    label: "网站设置"
    files:
      - name: "nav"
        label: "导航菜单"
        file: "data/nav.yaml"
        fields:
          - label: "菜单项"
            name: "items"
            widget: "list"
            label_singular: "菜单项"
            fields:
              - { label: "中文名", name: "name_zh", widget: "string" }
              - { label: "英文名", name: "name_en", widget: "string" }
              - { label: "链接", name: "url", widget: "string", required: false, hint: "有子菜单时留空" }
              - { label: "Section（高亮检测）", name: "section", widget: "string", required: false, hint: "页面的 section 名，如 being / capsule，有子菜单时留空" }
              - { label: "页面描述（中文）", name: "desc_zh", widget: "string", required: false }
              - { label: "页面描述（英文）", name: "desc_en", widget: "string", required: false }
              - label: "子菜单项"
                name: "children"
                widget: "list"
                required: false
                label_singular: "子菜单项"
                fields:
                  - { label: "中文名", name: "name_zh", widget: "string" }
                  - { label: "英文名", name: "name_en", widget: "string" }
                  - { label: "链接", name: "url", widget: "string" }
                  - { label: "Section", name: "section", widget: "string", required: false }
                  - { label: "页面描述（中文）", name: "desc_zh", widget: "string", required: false }
                  - { label: "页面描述（英文）", name: "desc_en", widget: "string", required: false }

      - name: "gears"
        label: "装备 Gears"
        file: "data/gears.yaml"
        fields:
          - label: "分类"
            name: "categories"
            widget: "list"
            label_singular: "分类"
            fields:
              - { label: "分类名（中文）", name: "name_zh", widget: "string" }
              - { label: "分类名（英文）", name: "name_en", widget: "string" }
              - label: "工具列表"
                name: "items"
                widget: "list"
                label_singular: "工具"
                fields:
                  - { label: "名称", name: "name", widget: "string" }
                  - { label: "链接", name: "url", widget: "string", required: false }
                  - label: "图标类型"
                    name: "icon_type"
                    widget: "select"
                    default: "favicon"
                    options:
                      - { label: "自动抓取网站图标", value: "favicon" }
                      - { label: "Emoji", value: "emoji" }
                      - { label: "上传图片", value: "upload" }
                  - { label: "Emoji", name: "icon_emoji", widget: "string", required: false }
                  - { label: "图片", name: "icon_image", widget: "image", required: false }
                  - { label: "一句话评价（中文）", name: "desc_zh", widget: "string", required: false }
                  - { label: "一句话评价（英文）", name: "desc_en", widget: "string", required: false }
                  - { label: "评分（1-5）", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, required: false }
                  - label: "使用状态"
                    name: "status"
                    widget: "select"
                    required: false
                    options:
                      - { label: "在用", value: "在用" }
                      - { label: "曾经用过", value: "曾经用过" }
                      - { label: "想试试", value: "想试试" }

      - name: "travel"
        label: "足迹地图"
        file: "data/travel.yaml"
        fields:
          - label: "去过的国家/地区"
            name: "countries"
            widget: "list"
            label_singular: "国家/地区"
            summary: "{{fields.name_zh}} ({{fields.code}}) — {{fields.year}}"
            fields:
              - { label: "ISO 国家码", name: "code", widget: "string", hint: "ISO 3166-1 alpha-2，如 CN、US、JP" }
              - { label: "中文名", name: "name_zh", widget: "string" }
              - { label: "英文名", name: "name_en", widget: "string" }
              - { label: "首次到访年份", name: "year", widget: "number", value_type: "int", min: 1900, max: 2100 }
              - { label: "去过的城市（中文）", name: "cities_zh", widget: "list", allow_add: true, required: false }
              - { label: "去过的城市（英文）", name: "cities_en", widget: "list", allow_add: true, required: false }
              - { label: "备注（中文）", name: "notes_zh", widget: "string", required: false }
              - { label: "备注（英文）", name: "notes_en", widget: "string", required: false }
