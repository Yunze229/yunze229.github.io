<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yunze · 写作后台</title>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    CMS.registerPreviewStyle('/admin/preview.css');

    const catEn = {
      '作品': 'Projects', '日记': 'Journal', '技能笔记': 'Skills',
      '手册': 'Manual', '旅行': 'Travel', '随想': 'Thoughts',
      '读书': 'Reading', '学习笔记': 'Study Notes', '书单': 'Reading List'
    };

    const PostPreview = ({ entry, widgetFor }) => {
      const data     = entry.get('data');
      const title    = data.get('title') || '';
      const date     = data.get('date');
      const cats     = data.get('categories');
      const tags     = data.get('tags');
      const isPriv   = data.get('private');

      const fmtDate = d => {
        if (!d) return '';
        const dt = new Date(d);
        return isNaN(dt) ? d : dt.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      };

      return h('div', { className: 'preview-wrap' },
        h('article', {},
          h('header', { className: 'article-header' },
            h('h1', { className: 'article-title' }, title),
            h('div', { className: 'article-meta' },
              h('time', {}, fmtDate(date)),
              cats && cats.map(c =>
                h('span', { key: c }, catEn[c] || c)
              ),
              isPriv && h('span', { className: 'article-private-badge' }, '🔒 Private')
            )
          ),
          isPriv && h('div', { className: 'private-notice' }, 'This post is private.'),
          h('div', { className: 'article-content' }, widgetFor('body')),
          tags && tags.size > 0 && h('div', { className: 'article-tags' },
            tags.map(t => h('span', { key: t, className: 'tag' }, '# ' + t))
          )
        )
      );
    };

    CMS.registerPreviewTemplate('posts', PostPreview);
  </script>

  <script>
  // Guard: disable toggles in capsule entries before unlock date
  (function() {
    function guardToggles() {
      if (!window.location.hash.includes('/collections/capsule/entries/')) return;

      // Find unlock_date value from any visible input
      let unlockDate = null;
      document.querySelectorAll('input').forEach(function(inp) {
        if (/^\d{4}-\d{2}-\d{2}$/.test((inp.value || '').trim())) {
          const container = inp.closest('div[class]');
          if (container && container.textContent.includes('开封日')) {
            unlockDate = inp.value.trim();
          }
        }
      });
      if (!unlockDate) return;

      const today = new Date().toISOString().slice(0, 10);
      if (unlockDate <= today) {
        document.querySelectorAll('.cms-guard-warn').forEach(function(el) { el.remove(); });
        return;
      }

      // Labels to guard and their warning messages
      var guards = [
        { text: '确认已读',   warn: '⚠️ 尚未到开封日（' + unlockDate + '），不可提前确认已读' },
        { text: '公开到博客', warn: '⚠️ 尚未到开封日（' + unlockDate + '），不可提前公开' },
      ];

      document.querySelectorAll('label, span').forEach(function(el) {
        guards.forEach(function(g) {
          if (!el.textContent.includes(g.text)) return;
          const field = el.closest('div[class]');
          if (!field) return;

          const toggle = field.querySelector('input[type="checkbox"], [role="switch"], button[aria-checked]');
          if (toggle) {
            toggle.disabled = true;
            toggle.style.opacity = '0.4';
            toggle.style.pointerEvents = 'none';
          }
          if (!field.querySelector('.cms-guard-warn')) {
            const warn = document.createElement('p');
            warn.className = 'cms-guard-warn';
            warn.style.cssText = 'color:#c0392b;font-size:0.82em;margin:4px 0 0;';
            warn.textContent = g.warn;
            field.appendChild(warn);
          }
        });
      });
    }

    let lastHash = '';
    setInterval(function() {
      if (window.location.hash !== lastHash) {
        lastHash = window.location.hash;
        setTimeout(guardToggles, 1200);
      }
      guardToggles();
    }, 800);
  })();
  </script>
</body>
</html>
