<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yunze · 写作后台</title>
  <style>
    /* Floating voice-diary launcher — opens /admin/voice/ in a new tab. */
    #voice-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 99998;
      background: #d97757;
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(217, 119, 87, 0.35);
      opacity: 0.85;
      transition: opacity 0.2s, transform 0.2s;
    }
    #voice-fab:hover {
      opacity: 1;
      transform: translateY(-2px);
    }
    @media (max-width: 640px) {
      #voice-fab {
        bottom: 16px;
        right: 16px;
        padding: 10px 14px;
        font-size: 13px;
      }
    }

    /* Upload-progress overlay — fed by the fetch-wrapper script below. */
    :root {
      --up-card:    #ffffff;
      --up-fg:      #2a2a2a;
      --up-faint:   #999999;
      --up-line:    #ece8df;
      --up-accent:  #d97757;
      --up-ok:      #2e8b57;
      --up-danger:  #c0392b;
      --up-pad:     12px;
      --up-gap:     8px;
      --up-radius:  8px;
      --up-bar-h:   4px;
      --up-bar-r:   6px;
      --up-bottom:  48px;
      --up-left:    24px;
    }
    #upload-progress-stack {
      position: fixed;
      bottom: var(--up-bottom);
      left: var(--up-left);
      z-index: 99997;
      display: flex;
      flex-direction: column;
      gap: var(--up-gap);
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    }
    .upload-card {
      background: var(--up-card);
      color: var(--up-fg);
      border-radius: var(--up-radius);
      padding: var(--up-pad);
      pointer-events: auto;
    }
    .upload-card__top {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: var(--up-gap);
    }
    .upload-card__meta {
      color: var(--up-faint);
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--up-gap);
    }
    .upload-card__bar-wrap {
      height: var(--up-bar-h);
      background: var(--up-line);
      border-radius: var(--up-bar-r);
      overflow: hidden;
    }
    .upload-card__bar {
      height: 100%;
      width: 0;
      background: var(--up-accent);
      transition: width .15s linear;
    }
    .upload-card.is-ok  .upload-card__bar { background: var(--up-ok); }
    .upload-card.is-err .upload-card__bar { background: var(--up-danger); }
  </style>
</head>
<body>
  <a id="voice-fab" href="/admin/voice/" target="_blank" rel="noopener" title="录音→AI润色→一键发布">🎙️ 语音日记</a>

  <script>
  // Wrap window.fetch to surface real upload progress for GitHub media commits.
  // Must run before sveltia-cms.js so its fetch calls go through our wrapper.
  (function() {
    var CONTENTS_RE = /api\.github\.com\/repos\/[^/]+\/[^/]+\/contents\/images\/uploads\//;
    var BLOBS_RE    = /api\.github\.com\/repos\/[^/]+\/[^/]+\/git\/blobs(\?|$)/;
    var _fetch = window.fetch.bind(window);

    var stackEl = null;
    function getStack() {
      if (stackEl && document.body.contains(stackEl)) return stackEl;
      stackEl = document.createElement('div');
      stackEl.id = 'upload-progress-stack';
      document.body.appendChild(stackEl);
      return stackEl;
    }

    function fmtSize(n) {
      if (!n) return '';
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1024 / 1024).toFixed(1) + ' MB';
    }

    function nameFromUrl(url, fallback) {
      try {
        var path = new URL(url).pathname;
        var last = path.split('/').pop();
        return last ? decodeURIComponent(last) : fallback;
      } catch (e) { return fallback; }
    }

    function sizeFromBody(body) {
      if (typeof body !== 'string') return 0;
      var m = body.match(/"content"\s*:\s*"([^"]*)"/);
      if (!m) return 0;
      return Math.floor(m[1].length * 3 / 4);
    }

    function makeCard(label, sizeBytes) {
      var card = document.createElement('div');
      card.className = 'upload-card';
      var top = document.createElement('div');
      top.className = 'upload-card__top';
      top.textContent = label;
      var meta = document.createElement('div');
      meta.className = 'upload-card__meta';
      var pct = document.createElement('span'); pct.textContent = '0%';
      var sz  = document.createElement('span'); sz.textContent = fmtSize(sizeBytes);
      meta.appendChild(pct); meta.appendChild(sz);
      var wrap = document.createElement('div');
      wrap.className = 'upload-card__bar-wrap';
      var bar = document.createElement('div');
      bar.className = 'upload-card__bar';
      wrap.appendChild(bar);
      card.appendChild(top); card.appendChild(meta); card.appendChild(wrap);
      getStack().appendChild(card);
      return { card: card, bar: bar, pct: pct };
    }

    function copyHeaders(xhr, hdrs) {
      if (!hdrs) return;
      try {
        if (typeof Headers !== 'undefined' && hdrs instanceof Headers) {
          hdrs.forEach(function(v, k) { xhr.setRequestHeader(k, v); });
        } else if (Array.isArray(hdrs)) {
          hdrs.forEach(function(p) { xhr.setRequestHeader(p[0], p[1]); });
        } else {
          Object.keys(hdrs).forEach(function(k) { xhr.setRequestHeader(k, hdrs[k]); });
        }
      } catch (e) {}
    }

    function parseRespHeaders(raw) {
      var h = new Headers();
      (raw || '').split(/\r?\n/).forEach(function(line) {
        var i = line.indexOf(':');
        if (i > 0) {
          try { h.append(line.slice(0, i).trim(), line.slice(i + 1).trim()); } catch (e) {}
        }
      });
      return h;
    }

    var blobCounter = 0;

    window.fetch = function(input, init) {
      var url    = typeof input === 'string' ? input : (input && input.url) || '';
      var method = ((init && init.method) || (input && input.method) || 'GET').toUpperCase();

      var isContents = method === 'PUT'  && CONTENTS_RE.test(url);
      var isBlob     = method === 'POST' && BLOBS_RE.test(url);
      if (!isContents && !isBlob) return _fetch(input, init);

      var body = init && init.body;
      if (typeof body !== 'string') return _fetch(input, init);

      var size = sizeFromBody(body);
      if (size < 50 * 1024) return _fetch(input, init);

      var label = isContents
        ? '📤 ' + nameFromUrl(url, '上传中')
        : '📤 图片 ' + (++blobCounter);

      var ui = makeCard(label, size);
      function fade(ms) {
        setTimeout(function() {
          if (ui.card.parentNode) ui.card.parentNode.removeChild(ui.card);
        }, ms);
      }

      return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open(method, url);
        copyHeaders(xhr, (init && init.headers) || (input && input.headers));

        xhr.upload.onprogress = function(e) {
          if (!e.lengthComputable) return;
          var p = Math.min(1, e.loaded / e.total);
          ui.bar.style.width = (p * 100).toFixed(1) + '%';
          ui.pct.textContent = Math.round(p * 100) + '%';
        };
        xhr.upload.onload = function() {
          ui.bar.style.width = '100%';
          ui.pct.textContent = '处理中…';
        };

        xhr.onload = function() {
          var ok = xhr.status >= 200 && xhr.status < 300;
          if (ok) {
            ui.card.classList.add('is-ok');
            ui.pct.textContent = '✓ 完成';
            fade(900);
          } else {
            ui.card.classList.add('is-err');
            ui.pct.textContent = '✗ ' + xhr.status;
            fade(5000);
          }
          resolve(new Response(xhr.responseText, {
            status: xhr.status,
            statusText: xhr.statusText,
            headers: parseRespHeaders(xhr.getAllResponseHeaders())
          }));
        };
        xhr.onerror = function() {
          ui.card.classList.add('is-err');
          ui.pct.textContent = '✗ 网络错误';
          fade(5000);
          reject(new TypeError('Network request failed'));
        };

        var signal = init && init.signal;
        if (signal) {
          if (signal.aborted) {
            xhr.abort();
            ui.card.classList.add('is-err');
            ui.pct.textContent = '已取消';
            fade(2000);
            return reject(new DOMException('Aborted', 'AbortError'));
          }
          signal.addEventListener('abort', function() {
            xhr.abort();
            ui.card.classList.add('is-err');
            ui.pct.textContent = '已取消';
            fade(2000);
            reject(new DOMException('Aborted', 'AbortError'));
          });
        }

        xhr.send(body);
      });
    };
  })();
  </script>

  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    CMS.registerPreviewStyle('/admin/preview.css');

    const catEn = {
      '作品': 'Projects', '日记': 'Journal', '技能笔记': 'Skills',
      '手册': 'Manual', '旅行': 'Travel', '随想': 'Thoughts',
      '读书': 'Reading', '学习笔记': 'Study Notes', '书单': 'Reading List'
    };

    const PostPreview = ({ entry, widgetFor }) => {
      const data     = entry.get('data');
      const title    = data.get('title') || '';
      const date     = data.get('date');
      const cats     = data.get('categories');
      const tags     = data.get('tags');
      const isPriv   = data.get('private');

      const fmtDate = d => {
        if (!d) return '';
        const dt = new Date(d);
        return isNaN(dt) ? d : dt.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      };

      return h('div', { className: 'preview-wrap' },
        h('article', {},
          h('header', { className: 'article-header' },
            h('h1', { className: 'article-title' }, title),
            h('div', { className: 'article-meta' },
              h('time', {}, fmtDate(date)),
              cats && cats.map(c =>
                h('span', { key: c }, catEn[c] || c)
              ),
              isPriv && h('span', { className: 'article-private-badge' }, '🔒 Private')
            )
          ),
          isPriv && h('div', { className: 'private-notice' }, 'This post is private.'),
          h('div', { className: 'article-content' }, widgetFor('body')),
          tags && tags.size > 0 && h('div', { className: 'article-tags' },
            tags.map(t => h('span', { key: t, className: 'tag' }, '# ' + t))
          )
        )
      );
    };

    CMS.registerPreviewTemplate('posts', PostPreview);
  </script>

  <script>
  // Guard: block toggling read/reveal before unlock date
  (function() {
    var GUARDED = ['确认已读', '公开到博客'];

    // Unlock date is embedded in the filename, which is in the URL hash.
    // e.g. #/collections/capsule/entries/mom-2028-02-29-abc123
    function getUnlockDate() {
      var hash = window.location.hash || '';
      if (!hash.includes('capsule')) return null;
      var m = hash.match(/(\d{4}-\d{2}-\d{2})/);
      return m ? m[0] : null;
    }

    function isLocked(unlockDate) {
      if (!unlockDate) return false;
      return unlockDate > new Date().toISOString().slice(0, 10);
    }

    // Walk up from el; return label name if any ancestor (within depth) contains it.
    function nearGuardedLabel(el) {
      var node = el;
      for (var i = 0; i < 15; i++) {
        if (!node || node === document.body) break;
        var t = node.textContent || '';
        for (var j = 0; j < GUARDED.length; j++) {
          if (t.includes(GUARDED[j])) return GUARDED[j];
        }
        node = node.parentElement;
      }
      return null;
    }

    function showToast(msg) {
      var old = document.getElementById('cms-guard-toast');
      if (old) old.remove();
      var el = document.createElement('div');
      el.id = 'cms-guard-toast';
      el.style.cssText = [
        'position:fixed', 'top:18px', 'left:50%', 'transform:translateX(-50%)',
        'background:#c0392b', 'color:#fff', 'padding:10px 20px', 'border-radius:6px',
        'font-size:13px', 'z-index:99999', 'pointer-events:none',
        'box-shadow:0 2px 10px rgba(0,0,0,.3)', 'white-space:nowrap'
      ].join(';');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { if (el.parentNode) el.remove(); }, 3000);
    }

    // Capture-phase listener: intercepts before Sveltia handles the event.
    // Blocks toggle clicks near guarded labels, but never inside dialogs/modals.
    document.addEventListener('click', function(e) {
      var unlockDate = getUnlockDate();
      if (!isLocked(unlockDate)) return;

      var target = e.target;

      // Never block clicks inside any dialog or modal overlay
      if (target.closest('[role="dialog"]') ||
          target.closest('[role="alertdialog"]') ||
          target.closest('.modal') ||
          target.closest('[data-modal]')) return;

      // Only intercept elements with an explicit toggle ARIA role or checkbox input.
      // Never match plain <button> or <input type="text"> to avoid false positives.
      var toggle = (
        target.closest('[role="switch"]') ||
        target.closest('[role="checkbox"]') ||
        target.closest('input[type="checkbox"]')
      );
      if (!toggle) return;

      var label = nearGuardedLabel(target);
      if (!label) return;

      e.stopImmediatePropagation();
      e.preventDefault();
      showToast('⚠️ 未到开封日（' + unlockDate + '）— ' + label + ' 暂时锁定');
    }, true);

    // Inject warning text below each guarded field
    function injectWarnings() {
      document.querySelectorAll('.cms-guard-warn').forEach(function(el) { el.remove(); });
      var unlockDate = getUnlockDate();
      if (!isLocked(unlockDate)) return;

      // Find label elements whose text exactly matches a guarded label
      document.querySelectorAll('label, span, div, p').forEach(function(el) {
        var t = (el.textContent || '').trim();
        for (var j = 0; j < GUARDED.length; j++) {
          if (t === GUARDED[j] || t.startsWith(GUARDED[j] + '\n') || t.startsWith(GUARDED[j] + ' ')) {
            var container = el.parentElement;
            if (!container || container.querySelector('.cms-guard-warn')) return;
            var warn = document.createElement('p');
            warn.className = 'cms-guard-warn';
            warn.style.cssText = 'color:#c0392b;font-size:0.8em;margin:3px 0 2px;line-height:1.4';
            warn.textContent = '🔒 开封日前锁定（' + unlockDate + '）';
            container.appendChild(warn);
          }
        }
      });
    }

    // ── Fields that are always read-only in capsule entries ──────────────────
    // label keyword → tooltip message
    var READONLY_FIELDS = {
      '开封日':    '开封日期不可修改',
      '写信人':    '写信人不可修改',
    };

    var _readonlyInputs = [];   // list of locked <input> elements

    function lockReadonlyFields() {
      if (!window.location.hash.includes('capsule')) { _readonlyInputs = []; return; }

      // Re-apply to already-found inputs (survives Sveltia re-renders)
      _readonlyInputs.forEach(function(inp) {
        if (document.body.contains(inp)) inp.readOnly = true;
      });

      // Scan for new inputs that match a readonly label
      document.querySelectorAll('input').forEach(function(inp) {
        if (_readonlyInputs.indexOf(inp) !== -1) return;  // already locked
        var node = inp.parentElement;
        for (var i = 0; i < 5; i++) {
          if (!node || node === document.body) break;
          var t = (node.textContent || '').trim();
          if (t.length < 150) {
            var matched = null;
            Object.keys(READONLY_FIELDS).forEach(function(key) {
              if (!matched && t.includes(key)) matched = key;
            });
            if (matched) {
              inp.readOnly = true;
              inp.style.cursor = 'not-allowed';
              inp.style.opacity = '0.6';
              inp.title = READONLY_FIELDS[matched];
              _readonlyInputs.push(inp);
              break;
            }
          }
          node = node.parentElement;
        }
      });
    }

    // Block keydown + paste on all locked inputs
    document.addEventListener('keydown', function(e) {
      if (_readonlyInputs.indexOf(e.target) !== -1) {
        e.preventDefault(); e.stopImmediatePropagation();
      }
    }, true);
    document.addEventListener('paste', function(e) {
      if (_readonlyInputs.indexOf(e.target) !== -1) {
        e.preventDefault(); e.stopImmediatePropagation();
      }
    }, true);

    // ── Polling ─────────────────────────────────────────────────────────────
    var lastHash = '';
    setInterval(function() {
      var h = window.location.hash;
      if (h !== lastHash) {
        lastHash = h;
        _lockedInput = null;
        setTimeout(function() { injectWarnings(); lockReadonlyFields(); }, 1200);
      }
      lockReadonlyFields();
    }, 400);
  })();
  </script>
</body>
</html>
