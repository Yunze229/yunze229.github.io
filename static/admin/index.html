<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yunze · 写作后台</title>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    CMS.registerPreviewStyle('/admin/preview.css');

    const catEn = {
      '作品': 'Projects', '日记': 'Journal', '技能笔记': 'Skills',
      '手册': 'Manual', '旅行': 'Travel', '随想': 'Thoughts',
      '读书': 'Reading', '学习笔记': 'Study Notes', '书单': 'Reading List'
    };

    const PostPreview = ({ entry, widgetFor }) => {
      const data     = entry.get('data');
      const title    = data.get('title') || '';
      const date     = data.get('date');
      const cats     = data.get('categories');
      const tags     = data.get('tags');
      const isPriv   = data.get('private');

      const fmtDate = d => {
        if (!d) return '';
        const dt = new Date(d);
        return isNaN(dt) ? d : dt.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      };

      return h('div', { className: 'preview-wrap' },
        h('article', {},
          h('header', { className: 'article-header' },
            h('h1', { className: 'article-title' }, title),
            h('div', { className: 'article-meta' },
              h('time', {}, fmtDate(date)),
              cats && cats.map(c =>
                h('span', { key: c }, catEn[c] || c)
              ),
              isPriv && h('span', { className: 'article-private-badge' }, '🔒 Private')
            )
          ),
          isPriv && h('div', { className: 'private-notice' }, 'This post is private.'),
          h('div', { className: 'article-content' }, widgetFor('body')),
          tags && tags.size > 0 && h('div', { className: 'article-tags' },
            tags.map(t => h('span', { key: t, className: 'tag' }, '# ' + t))
          )
        )
      );
    };

    CMS.registerPreviewTemplate('posts', PostPreview);
  </script>

  <script>
  // Guard: block toggling read/reveal before unlock date
  (function() {
    var GUARDED_LABELS = ['确认已读', '公开到博客'];

    function getUnlockDate() {
      if (!window.location.hash.includes('/collections/capsule/entries/')) return null;
      var found = null;
      document.querySelectorAll('input').forEach(function(inp) {
        if (found) return;
        var v = (inp.value || '').trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(v)) return;
        // Walk up to see if any ancestor label mentions 开封日
        var el = inp.parentElement;
        for (var i = 0; i < 8; i++) {
          if (!el) break;
          if ((el.textContent || '').includes('开封日')) { found = v; break; }
          el = el.parentElement;
        }
      });
      return found;
    }

    function isToggleGuarded(toggleEl) {
      // Walk up ancestors to find a field wrapper containing a guarded label
      var el = toggleEl.parentElement;
      for (var i = 0; i < 12; i++) {
        if (!el) break;
        var text = el.textContent || '';
        for (var j = 0; j < GUARDED_LABELS.length; j++) {
          if (text.includes(GUARDED_LABELS[j])) return GUARDED_LABELS[j];
        }
        el = el.parentElement;
      }
      return null;
    }

    function updateWarnings(unlockDate) {
      // Remove stale warnings
      document.querySelectorAll('.cms-guard-warn').forEach(function(el) { el.remove(); });
      if (!unlockDate) return;
      var today = new Date().toISOString().slice(0, 10);
      if (unlockDate <= today) return;

      // Add visual warning near each guarded toggle
      document.querySelectorAll('[role="switch"]').forEach(function(toggle) {
        var label = isToggleGuarded(toggle);
        if (!label) return;
        // Find a stable parent to attach warning to
        var wrapper = toggle.parentElement;
        for (var i = 0; i < 6; i++) {
          if (!wrapper) break;
          if ((wrapper.textContent || '').includes(label)) break;
          wrapper = wrapper.parentElement;
        }
        if (!wrapper || wrapper.querySelector('.cms-guard-warn')) return;
        var msg = {
          '确认已读':   '⚠️ 尚未到开封日（' + unlockDate + '），不可提前确认已读',
          '公开到博客': '⚠️ 尚未到开封日（' + unlockDate + '），不可提前公开',
        }[label];
        var warn = document.createElement('p');
        warn.className = 'cms-guard-warn';
        warn.style.cssText = 'color:#c0392b;font-size:0.82em;margin:4px 0 0;';
        warn.textContent = msg;
        wrapper.appendChild(warn);
      });
    }

    // Intercept clicks in capture phase — runs before Sveltia's own handlers
    document.addEventListener('click', function(e) {
      var unlockDate = getUnlockDate();
      if (!unlockDate) return;
      var today = new Date().toISOString().slice(0, 10);
      if (unlockDate <= today) return;

      var toggle = e.target.closest('[role="switch"]');
      if (!toggle) return;
      if (!isToggleGuarded(toggle)) return;

      e.stopImmediatePropagation();
      e.preventDefault();
    }, true); // capture phase

    // Refresh warning labels periodically
    var lastHash = '';
    setInterval(function() {
      var hash = window.location.hash;
      if (hash !== lastHash) { lastHash = hash; setTimeout(function() { updateWarnings(getUnlockDate()); }, 1000); }
      updateWarnings(getUnlockDate());
    }, 1000);
  })();
  </script>
</body>
</html>
