{{ if .Site.Params.giscus_repo_id }}
<div id="giscus-container"></div>
<script>
(function() {
  const lang = localStorage.getItem('lang') || 'zh';
  const s = document.createElement('script');
  s.src = 'https://giscus.app/client.js';
  s.setAttribute('data-repo', '{{ .Site.Params.giscus_repo }}');
  s.setAttribute('data-repo-id', '{{ .Site.Params.giscus_repo_id }}');
  s.setAttribute('data-category', '{{ .Site.Params.giscus_category }}');
  s.setAttribute('data-category-id', '{{ .Site.Params.giscus_category_id }}');
  s.setAttribute('data-mapping', 'pathname');
  s.setAttribute('data-strict', '0');
  s.setAttribute('data-reactions-enabled', '1');
  s.setAttribute('data-emit-metadata', '0');
  s.setAttribute('data-input-position', 'bottom');
  s.setAttribute('data-theme', 'preferred_color_scheme');
  s.setAttribute('data-lang', lang === 'zh' ? 'zh-CN' : 'en');
  s.crossOrigin = 'anonymous';
  s.async = true;
  document.getElementById('giscus-container').appendChild(s);
})();
</script>
{{ else }}
<p style="color:var(--fg-faint);font-size:0.85rem;">
  <span class="lang-zh">评论功能配置中，即将开放。</span>
  <span class="lang-en">Comments coming soon.</span>
</p>
{{ end }}
